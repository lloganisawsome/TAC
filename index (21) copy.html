  <style>
   :root {
    --bg: #0a0a0b;
    --panel: #111113;
    --panel-hover: #1a1a1c;
    --accent: #22c55e;
    --accent-dim: rgba(34, 197, 94, 0.1);
    --muted: #71717a;
    --border: rgba(255,255,255,0.06);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: #fff; font-size: 14px; }
::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }

.sidebar { position: fixed; left: 10px; top: 50%; transform: translateY(-50%); width: 70px; background: var(--panel); border: 1px solid var(--accent); border-radius: 16px; display: flex; flex-direction: column; align-items: center; padding: 12px 0; transition: all 0.3s ease; z-index: 1000; box-shadow: 0 0 20px var(--accent-dim); }
.sidebar.collapsed { width: 0; padding: 0; border: none; margin-left: -10px; overflow: hidden; }
.logo-container { margin-bottom: 16px; padding: 4px; transition: opacity 0.3s; }
.sidebar.collapsed .logo-container { opacity: 0; }
.logo { width: 62px; height: 62px; border-radius: 8px; }
.nav-items { display: flex; flex-direction: column; align-items: center; gap: 4px; width: 100%; padding: 0 8px; transition: opacity 0.3s; }
.sidebar.collapsed .nav-items { opacity: 0; }
.nav-item { display: flex; flex-direction: column; align-items: center; justify-content: center; width: 54px; height: 54px; border-radius: 10px; text-decoration: none; color: var(--accent); transition: all 0.2s ease; cursor: pointer; }
.nav-item:hover { background: var(--accent-dim); }
.nav-item.active { background: var(--accent-dim); border: 1px solid var(--accent); }
.nav-item svg { width: 24px; height: 24px; margin-bottom: 2px; }
.nav-item span { font-size: 9px; font-weight: 500; }
.toggle-btn { position: fixed; left: 90px; top: 50%; transform: translateY(-50%); width: 20px; height: 36px; background: var(--panel); border: 1px solid var(--border); border-radius: 6px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.3s ease; z-index: 1001; }
.toggle-btn:hover { background: var(--panel-hover); border-color: var(--accent); }
.toggle-btn svg { width: 14px; height: 14px; color: #fff; transition: transform 0.3s ease; }
.toggle-btn.collapsed { left: 10px; }
.toggle-btn.collapsed svg { transform: rotate(180deg); }
.main-content { margin-left: 100px; padding: 24px; padding-bottom: 120px; transition: margin-left 0.3s ease; }
.main-content.expanded { margin-left: 24px; }
.header { margin-bottom: 32px; text-align: center; }
.header h1 { font-size: 32px; font-weight: 700; margin-bottom: 8px; }
.header-sub { font-size: 14px; color: var(--muted); }
.controls-bar { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }
.search-box { flex: 1; min-width: 200px; position: relative; }
.search-box input { width: 100%; background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 10px 14px 10px 38px; color: #fff; font-size: 14px; outline: none; transition: border-color 0.2s; }
.search-box input:focus { border-color: var(--accent); }
.search-box input::placeholder { color: var(--muted); }
.search-box svg { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); width: 16px; height: 16px; color: var(--muted); }
.filter-btn { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 10px 16px; color: #fff; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 6px; }
.filter-btn:hover { border-color: var(--accent); background: var(--panel-hover); }
.filter-btn.active { border-color: var(--accent); background: var(--accent-dim); color: var(--accent); }
.filter-btn svg { width: 16px; height: 16px; }
.song-list { display: flex; flex-direction: column; gap: 4px; }
.song-item { display: flex; align-items: center; gap: 14px; padding: 12px 16px; background: var(--panel); border: 1px solid var(--border); border-radius: 10px; cursor: pointer; transition: all 0.2s; user-select: none; }
.song-item:hover { background: var(--panel-hover); border-color: rgba(255,255,255,0.1); }
.song-item.playing { border-color: var(--accent); background: var(--accent-dim); }
.song-number { width: 28px; text-align: center; font-size: 13px; color: var(--muted); font-weight: 500; flex-shrink: 0; }
.song-item.playing .song-number { display: none; }
.song-playing-icon { display: none; width: 28px; justify-content: center; align-items: center; gap: 2px; flex-shrink: 0; }
.song-item.playing .song-playing-icon { display: flex; }
.eq-bar { width: 3px; background: var(--accent); border-radius: 2px; animation: eqBounce 0.8s ease-in-out infinite alternate; }
.eq-bar:nth-child(1) { height: 12px; animation-delay: 0s; }
.eq-bar:nth-child(2) { height: 18px; animation-delay: 0.2s; }
.eq-bar:nth-child(3) { height: 10px; animation-delay: 0.4s; }
@keyframes eqBounce { 0% { transform: scaleY(0.3); } 100% { transform: scaleY(1); } }
.song-info { flex: 1; min-width: 0; }
.song-name { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.song-item.playing .song-name { color: var(--accent); }
.song-fav { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; border-radius: 8px; border: none; background: transparent; cursor: pointer; transition: all 0.2s; flex-shrink: 0; color: var(--muted); }
.song-fav:hover { background: rgba(255,255,255,0.05); color: #fff; }
.song-fav.favorited { color: var(--accent); }
.song-fav svg { width: 18px; height: 18px; }
.empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
.empty-state svg { width: 48px; height: 48px; margin: 0 auto 16px; opacity: 0.4; display: block; }
.empty-state p { font-size: 14px; line-height: 1.6; }

/* ── Inline overlay (bottom of music.html) ── */
.music-overlay { position: fixed; bottom: 16px; left: 16px; width: 300px; background: var(--panel); border: 1px solid var(--accent); border-radius: 14px; padding: 14px 16px; z-index: 9999; box-shadow: 0 0 24px var(--accent-dim), 0 8px 32px rgba(0,0,0,0.6); display: flex; flex-direction: column; gap: 10px; transition: all 0.3s ease; }
.music-overlay.hidden { transform: translateY(120%); opacity: 0; pointer-events: none; }
.overlay-top { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
.overlay-song-name { flex: 1; min-width: 0; font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--accent); }
.overlay-close-btn { width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; border: none; background: transparent; color: var(--muted); cursor: pointer; border-radius: 6px; transition: all 0.2s; flex-shrink: 0; }
.overlay-close-btn:hover { background: rgba(255,255,255,0.06); color: #fff; }
.overlay-close-btn svg { width: 14px; height: 14px; }
.overlay-progress-wrap { width: 100%; height: 4px; background: rgba(255,255,255,0.08); border-radius: 2px; cursor: pointer; }
.overlay-progress-bar { height: 100%; background: var(--accent); border-radius: 2px; width: 0%; transition: width 0.1s linear; }
.overlay-time { display: flex; justify-content: space-between; font-size: 10px; color: var(--muted); margin-top: -4px; }
.overlay-controls { display: flex; align-items: center; justify-content: center; gap: 6px; }
.ctrl-btn { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; border: none; background: transparent; color: #fff; cursor: pointer; border-radius: 8px; transition: all 0.2s; }
.ctrl-btn:hover { background: rgba(255,255,255,0.06); }
.ctrl-btn svg { width: 16px; height: 16px; }
.ctrl-btn.play-btn { width: 38px; height: 38px; background: var(--accent); color: #000; border-radius: 50%; }
.ctrl-btn.play-btn:hover { opacity: 0.85; }
.ctrl-btn.play-btn svg { width: 18px; height: 18px; }
.overlay-volume { display: flex; align-items: center; gap: 8px; }
.overlay-volume svg { width: 14px; height: 14px; color: var(--muted); flex-shrink: 0; }
.volume-slider { flex: 1; -webkit-appearance: none; appearance: none; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; outline: none; }
.volume-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; border-radius: 50%; background: var(--accent); cursor: pointer; }
.volume-slider::-moz-range-thumb { width: 12px; height: 12px; border-radius: 50%; background: var(--accent); cursor: pointer; border: none; }

@media (max-width: 768px) { .main-content { margin-left: 24px; } .sidebar { display: none; } .toggle-btn { display: none; } .music-overlay { width: calc(100% - 32px); } }
  </style>

  <script>
   // ── Theme ──
const themeColors = {
    green:{primary:'#22c55e',dim:'rgba(34,197,94,0.1)',shadow:'rgba(34,197,94,0.15)'},
    blue:{primary:'#3b82f6',dim:'rgba(59,130,246,0.1)',shadow:'rgba(59,130,246,0.15)'},
    red:{primary:'#ef4444',dim:'rgba(239,68,68,0.1)',shadow:'rgba(239,68,68,0.15)'},
    cyan:{primary:'#06b6d4',dim:'rgba(6,182,212,0.1)',shadow:'rgba(6,182,212,0.15)'},
    pink:{primary:'#ec4899',dim:'rgba(236,72,153,0.1)',shadow:'rgba(236,72,153,0.15)'},
    purple:{primary:'#8b5cf6',dim:'rgba(139,92,246,0.1)',shadow:'rgba(139,92,246,0.15)'},
    yellow:{primary:'#eab308',dim:'rgba(234,179,8,0.1)',shadow:'rgba(234,179,8,0.15)'},
    orange:{primary:'#f97316',dim:'rgba(249,115,22,0.1)',shadow:'rgba(249,115,22,0.15)'},
    white:{primary:'#ffffff',dim:'rgba(255,255,255,0.1)',shadow:'rgba(255,255,255,0.15)'},
    whiteout:{primary:'#ffffff',dim:'rgba(255,255,255,0.05)',shadow:'rgba(255,255,255,0.1)'}
};
function applyTheme(){
    const t=localStorage.getItem('theme')||'green';
    const c=themeColors[t]||themeColors.green;
    document.documentElement.style.setProperty('--accent',c.primary);
    document.documentElement.style.setProperty('--accent-dim',c.dim);
    const logo=document.getElementById('logo');
    if(logo) logo.src='taclogos/'+t+'.png';
    const sb=document.getElementById('sidebar');
    if(sb) sb.style.boxShadow='0 0 20px '+c.shadow;
}
applyTheme();
window.addEventListener('storage',function(e){ if(e.key==='theme') applyTheme(); });

// ── Sidebar ──
const sidebar=document.getElementById('sidebar');
const toggleBtn=document.getElementById('toggleBtn');
const mainContent=document.getElementById('mainContent');
toggleBtn.addEventListener('click',function(){
    sidebar.classList.toggle('collapsed');
    toggleBtn.classList.toggle('collapsed');
    mainContent.classList.toggle('expanded');
});

// ── Player State ──
const musicPlayer=document.getElementById('musicPlayer');
let allSongs=[], displayQueue=[], currentIndex=-1, isPlaying=false, isShuffled=true, showFavsOnly=false;

function getFavs(){ try{ return JSON.parse(localStorage.getItem('tacMusicFavs')||'[]'); }catch(e){ return []; } }
function saveFavs(f){ localStorage.setItem('tacMusicFavs',JSON.stringify(f)); }
function isFav(n){ return getFavs().indexOf(n)!==-1; }
function toggleFav(n){ let f=getFavs(); const i=f.indexOf(n); if(i===-1) f.push(n); else f.splice(i,1); saveFavs(f); }

// ── Sync state to localStorage so popup.html can read it ──
function syncState(){
    if(currentIndex>=0 && currentIndex<displayQueue.length){
        localStorage.setItem('tacMusicCurrent',JSON.stringify({name:displayQueue[currentIndex].name,file:displayQueue[currentIndex].file}));
    }
    localStorage.setItem('tacMusicPlaying',isPlaying?'true':'false');
    localStorage.setItem('tacMusicVolume',String(Math.round(musicPlayer.volume*100)));
    // Write current time for progress sync
    localStorage.setItem('tacMusicTime',JSON.stringify({current:musicPlayer.currentTime,duration:musicPlayer.duration||0}));
}

// ── CSV ──
function parseCSV(text){
    const lines=text.split('\n').map(function(l){return l.trim();}).filter(function(l){return l.length>0;});
    const songs=[];
    lines.forEach(function(line){
        // Skip header if it literally says "songname,filename"
        if(line.toLowerCase().replace(/\s/g,'')==='songname,filename') return;
        const comma=line.indexOf(',');
        if(comma===-1) return;
        const name=line.substring(0,comma).trim().replace(/^"|"$/g,'');
        const file=line.substring(comma+1).trim().replace(/^"|"$/g,'');
        if(name && file) songs.push({name:name,file:file});
    });
    return songs;
}

function shuffleArray(arr){
    const a=arr.slice();
    for(let i=a.length-1;i>0;i--){
        const j=Math.floor(Math.random()*(i+1));
        const tmp=a[i];a[i]=a[j];a[j]=tmp;
    }
    return a;
}

function buildQueue(){
    let src=allSongs.slice();
    if(showFavsOnly) src=src.filter(function(s){return isFav(s.name);});
    displayQueue=isShuffled?shuffleArray(src):src;
}

// ── Render ──
const songListEl=document.getElementById('songList');
const searchInput=document.getElementById('searchInput');

function escapeHTML(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function renderSongs(){
    const q=(searchInput.value||'').toLowerCase();
    let list=displayQueue;
    if(q) list=displayQueue.filter(function(s){return s.name.toLowerCase().indexOf(q)!==-1;});
    document.getElementById('songCount').textContent=list.length+' song'+(list.length!==1?'s':'');
    if(list.length===0){
        songListEl.innerHTML='<div class="empty-state"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg><p>'+(showFavsOnly?'No favorites yet. Click the heart on a song!':'No songs found.')+'</p></div>';
        return;
    }
    songListEl.innerHTML=list.map(function(song,idx){
        const gi=displayQueue.indexOf(song);
        const active=currentIndex===gi;
        const fav=isFav(song.name);
        return '<div class="song-item'+(active?' playing':'')+'" data-index="'+gi+'">'+
            '<span class="song-number">'+(idx+1)+'</span>'+
            '<div class="song-playing-icon"><span class="eq-bar"></span><span class="eq-bar"></span><span class="eq-bar"></span></div>'+
            '<div class="song-info"><div class="song-name">'+escapeHTML(song.name)+'</div></div>'+
            '<button class="song-fav'+(fav?' favorited':'')+'" data-song="'+escapeHTML(song.name)+'" title="'+(fav?'Remove from favorites':'Add to favorites')+'">'+
                (fav?'<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>':
                '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>')+
            '</button>'+
        '</div>';
    }).join('');

    songListEl.querySelectorAll('.song-item').forEach(function(el){
        el.addEventListener('click',function(e){
            if(e.target.closest('.song-fav')) return;
            playSongAt(parseInt(el.getAttribute('data-index')));
        });
    });
    songListEl.querySelectorAll('.song-fav').forEach(function(btn){
        btn.addEventListener('click',function(e){
            e.stopPropagation();
            toggleFav(btn.getAttribute('data-song'));
            renderSongs();
        });
    });
}

searchInput.addEventListener('input',renderSongs);

// ── Playback ──
function playSongAt(idx){
    if(idx<0||idx>=displayQueue.length) return;
    currentIndex=idx;
    const song=displayQueue[idx];
musicPlayer.src = song.file;    isPlaying=true;
    // Show overlay when a song starts
    document.getElementById('musicOverlay').classList.remove('hidden');
    syncState();
    updateOverlayUI();
    renderSongs();
}

function togglePlayPause(){
    if(!musicPlayer.src||displayQueue.length===0){ if(displayQueue.length>0) playSongAt(0); return; }
    if(musicPlayer.paused){ musicPlayer.play(); isPlaying=true; }
    else { musicPlayer.pause(); isPlaying=false; }
    syncState(); updateOverlayUI();
}

function playNext(){
    if(displayQueue.length===0) return;
    playSongAt((currentIndex+1)%displayQueue.length);
}
function playPrev(){
    if(displayQueue.length===0) return;
    if(musicPlayer.currentTime>3){ musicPlayer.currentTime=0; return; }
    playSongAt((currentIndex-1+displayQueue.length)%displayQueue.length);
}

musicPlayer.addEventListener('ended',playNext);
musicPlayer.addEventListener('play',function(){ isPlaying=true; syncState(); updateOverlayUI(); });
musicPlayer.addEventListener('pause',function(){ isPlaying=false; syncState(); updateOverlayUI(); });

// ── Overlay UI ──
const overlaySongName=document.getElementById('overlaySongName');
const playIcon=document.getElementById('playIcon');
const progressBar=document.getElementById('progressBar');
const progressWrap=document.getElementById('progressWrap');
const currentTimeEl=document.getElementById('currentTime');
const totalTimeEl=document.getElementById('totalTime');
const volumeSlider=document.getElementById('volumeSlider');

function formatTime(s){ if(isNaN(s)) return '0:00'; const m=Math.floor(s/60),sec=Math.floor(s%60); return m+':'+(sec<10?'0':'')+sec; }

function updateOverlayUI(){
    overlaySongName.textContent=(currentIndex>=0&&currentIndex<displayQueue.length)?displayQueue[currentIndex].name:'No song playing';
    playIcon.innerHTML=isPlaying?'<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>':'<path d="M8 5v14l11-7z"/>';
}

setInterval(function(){
    if(musicPlayer.duration){
        progressBar.style.width=((musicPlayer.currentTime/musicPlayer.duration)*100)+'%';
        currentTimeEl.textContent=formatTime(musicPlayer.currentTime);
        totalTimeEl.textContent=formatTime(musicPlayer.duration);
        syncState();
    }
},300);

progressWrap.addEventListener('click',function(e){
    if(!musicPlayer.duration) return;
    const r=progressWrap.getBoundingClientRect();
    musicPlayer.currentTime=((e.clientX-r.left)/r.width)*musicPlayer.duration;
});

// Volume
let vol=parseInt(localStorage.getItem('tacMusicVolume')||'50');
if(isNaN(vol)||vol<0) vol=50; if(vol>100) vol=100;
volumeSlider.value=vol;
musicPlayer.volume=vol/100;
volumeSlider.addEventListener('input',function(){
    musicPlayer.volume=parseInt(volumeSlider.value)/100;
    localStorage.setItem('tacMusicVolume',volumeSlider.value);
    syncState();
});

document.getElementById('playBtnCtrl').addEventListener('click',togglePlayPause);
document.getElementById('nextBtnCtrl').addEventListener('click',playNext);
document.getElementById('prevBtnCtrl').addEventListener('click',playPrev);
document.getElementById('overlayCloseBtn').addEventListener('click',function(){
    document.getElementById('musicOverlay').classList.add('hidden');
});

// ── Filter Buttons ──
document.getElementById('favFilterBtn').addEventListener('click',function(){
    showFavsOnly=!showFavsOnly;
    this.classList.toggle('active',showFavsOnly);
    const cur=currentIndex>=0&&currentIndex<displayQueue.length?displayQueue[currentIndex]:null;
    buildQueue();
    if(cur){ const ni=displayQueue.findIndex(function(s){return s.file===cur.file;}); if(ni!==-1) currentIndex=ni; }
    renderSongs();
});

document.getElementById('shuffleBtn').addEventListener('click',function(){
    isShuffled=!isShuffled;
    this.classList.toggle('active',isShuffled);
    const cur=currentIndex>=0&&currentIndex<displayQueue.length?displayQueue[currentIndex]:null;
    buildQueue();
    if(cur){ const ni=displayQueue.findIndex(function(s){return s.file===cur.file;}); if(ni!==-1) currentIndex=ni; }
    renderSongs();
});

// ── Listen for commands from popup.html ──
window.addEventListener('storage',function(e){
    if(e.key==='tacMusicCmd'){
        const cmd=e.newValue;
        if(cmd==='play'||cmd==='pause') togglePlayPause();
        if(cmd==='next') playNext();
        if(cmd==='prev') playPrev();
        if(cmd && cmd.startsWith('volume:')){ const v=parseInt(cmd.split(':')[1]); musicPlayer.volume=v/100; volumeSlider.value=v; }
        localStorage.removeItem('tacMusicCmd');
    }
});

// ── Load CSV ──
// Try several possible paths
function tryLoadCSV(paths, idx){
    if(idx>=paths.length){
        songListEl.innerHTML='<div class="empty-state"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg><p>Could not find songs.csv. Tried: Music/songs.csv — make sure the Music folder and songs.csv file exist.</p></div>';
        document.getElementById('songCount').textContent='0 songs';
        return;
    }
fetch(paths[idx])        .then(function(r){ if(!r.ok) throw new Error(r.status); return r.text(); })
        .then(function(text){
            allSongs=parseCSV(text);
            if(allSongs.length===0){
                songListEl.innerHTML='<div class="empty-state"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg><p>songs.csv loaded but no valid songs found. Format should be: songname,filename.mp3</p></div>';
                document.getElementById('songCount').textContent='0 songs';
                return;
            }
            buildQueue();
            renderSongs();
        })
        .catch(function(){ tryLoadCSV(paths,idx+1); });
}

tryLoadCSV(['Music/songs.csv','music/songs.csv','./Music/songs.csv'],0);
