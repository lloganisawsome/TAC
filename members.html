  <style>
   :root {
    --bg: #0a0a0b;
    --panel: #111113;
    --panel-hover: #1a1a1c;
    --accent: #22c55e;
    --accent-dim: rgba(34, 197, 94, 0.1);
    --muted: #71717a;
    --border: rgba(255,255,255,0.06);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
    height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: #fff;
    font-size: 14px;
}

::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }

/* Sidebar */
.sidebar {
    position: fixed;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    width: 70px;
    background: var(--panel);
    border: 1px solid var(--accent);
    border-radius: 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 12px 0;
    transition: all 0.3s ease;
    z-index: 1000;
    box-shadow: 0 0 20px var(--accent-dim);
}

.sidebar.collapsed { width: 0; padding: 0; border: none; margin-left: -10px; overflow: hidden; }
.logo-container { margin-bottom: 16px; padding: 4px; transition: opacity 0.3s; }
.sidebar.collapsed .logo-container { opacity: 0; }
.logo { width: 62px; height: 62px; border-radius: 8px; }
.nav-items { display: flex; flex-direction: column; align-items: center; gap: 4px; width: 100%; padding: 0 8px; transition: opacity 0.3s; }
.sidebar.collapsed .nav-items { opacity: 0; }

.nav-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 54px;
    height: 54px;
    border-radius: 10px;
    text-decoration: none;
    color: var(--accent);
    transition: all 0.2s ease;
    cursor: pointer;
}

.nav-item:hover { background: var(--accent-dim); }
.nav-item.active { background: var(--accent-dim); border: 1px solid var(--accent); }
.nav-item svg { width: 24px; height: 24px; margin-bottom: 2px; }
.nav-item span { font-size: 9px; font-weight: 500; }

.toggle-btn {
    position: fixed;
    left: 90px;
    top: 50%;
    transform: translateY(-50%);
    width: 20px;
    height: 36px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.3s ease;
    z-index: 1001;
}

.toggle-btn:hover { background: var(--panel-hover); border-color: var(--accent); }
.toggle-btn svg { width: 14px; height: 14px; color: #fff; transition: transform 0.3s ease; }
.toggle-btn.collapsed { left: 10px; }
.toggle-btn.collapsed svg { transform: rotate(180deg); }

/* Main Content */
.main-content { margin-left: 100px; padding: 24px; transition: margin-left 0.3s ease; }
.main-content.expanded { margin-left: 24px; }
.header { margin-bottom: 32px; text-align: center; }
.header h1 { font-size: 32px; font-weight: 700; margin-bottom: 8px; }
.header-stats { display: flex; justify-content: center; gap: 16px; margin-top: 12px; }

.stat-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 8px 16px;
    background: var(--accent-dim);
    border: 1px solid var(--accent);
    border-radius: 20px;
    font-size: 14px;
    color: var(--accent);
    font-weight: 500;
}

/* Search Bar */
.search-container { max-width: 500px; margin: 0 auto 24px; }
.search-wrapper { position: relative; }
.search-input {
    width: 100%;
    padding: 12px 16px 12px 44px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: #fff;
    font-size: 14px;
    outline: none;
    transition: all 0.2s ease;
}
.search-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-dim); }
.search-input::placeholder { color: var(--muted); }
.search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); width: 20px; height: 20px; color: var(--muted); pointer-events: none; }

/* Panel */
.panel { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 20px; }

/* Members List */
.members-section { margin-bottom: 24px; }
.members-section h2 { font-size: 16px; font-weight: 600; color: var(--accent); margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
.members-list { list-style: none; display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; }

/* NEW MEMBER STYLING */
.member-item {
    padding: 12px 16px;
    background: rgba(255,255,255,0.02);
    border: 1px solid var(--border);
    border-radius: 8px;
    transition: all 0.2s ease;
    display: flex;
    flex-direction: column;
    gap: 6px;
}
.member-item:hover { background: var(--panel-hover); border-color: var(--accent); transform: translateY(-2px); }

.member-header { display: flex; align-items: center; gap: 8px; font-weight: 500; font-size: 14px; color: #fff; }
.online-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.online-dot.on { background: var(--accent); box-shadow: 0 0 8px var(--accent-dim); animation: pulse 2s infinite; }
.online-dot.off { background: #ef4444; }

.member-details { display: flex; justify-content: space-between; align-items: center; margin-top: 4px; gap: 8px; }
.app-badge {
    background: rgba(255,255,255,0.06);
    padding: 4px 8px;
    border-radius: 4px;
    border: 1px solid var(--border);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    font-size: 11px;
    color: var(--muted);
    max-width: 140px;
}
.app-badge.active-app { color: var(--accent); border-color: var(--accent-dim); background: var(--accent-dim); }
.last-seen { font-size: 10px; color: var(--muted); white-space: nowrap; }

.empty-state { text-align: center; padding: 40px 20px; color: var(--muted); }
.empty-state svg { width: 48px; height: 48px; margin-bottom: 16px; opacity: 0.5; }
.empty-state p { font-size: 14px; line-height: 1.6; }
.no-results { text-align: center; padding: 24px; color: var(--muted); font-size: 14px; }

@keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
}

@media (max-width: 768px) {
    .main-content { margin-left: 24px; }
    .sidebar { display: none; }
    .toggle-btn { display: none; }
    .members-list { grid-template-columns: 1fr; }
}

  <script>
   const firebaseConfig = { apiKey: "AIzaSyBQslLAFRlIRJqsiJ2WWeTNslO067bzKYM", authDomain: "taclogin-ab38e.firebaseapp.com", databaseURL: "https://taclogin-ab38e-default-rtdb.firebaseio.com", projectId: "taclogin-ab38e", storageBucket: "taclogin-ab38e.firebasestorage.app", messagingSenderId: "937853298051", appId: "1:937853298051:web:119ccc7b5499514bd442b6" }; firebase.initializeApp(firebaseConfig);const db = firebase.database();

const membersContainer = document.getElementById('membersContainer');
const totalMembersEl = document.getElementById('totalMembers');
const searchInput = document.getElementById('searchInput');

// Listen to the activeUsers node - this is your source of truth
db.ref('activeUsers').on('value', snapshot => {
    const allData = snapshot.val();
    
    if (!allData) {
        membersContainer.innerHTML = "<p class='no-results'>No users found in Firebase.</p>";
        return;
    }

    renderList(allData, searchInput.value);
});

function renderList(data, filter = '') {
    const now = Date.now();
    const usernames = Object.keys(data).sort((a, b) => a.toLowerCase().localeCompare(b.toLowerCase()));
    
    totalMembersEl.textContent = `${usernames.length} Members`;

    let html = '<div class="members-section"><ul class="members-list">';
    let matchCount = 0;

    usernames.forEach(name => {
        // Search filter
        if (filter && !name.toLowerCase().includes(filter.toLowerCase())) return;
        matchCount++;

        const user = data[name];
        
        // Logic to determine if they are online (seen in the last 3 minutes)
        // Using 180000ms (3 mins) as the cutoff
        const isOnline = user.timestamp && (now - user.timestamp < 180000);
        
        const dotClass = isOnline ? 'on' : 'off';
        const statusText = isOnline ? (user.currentApp || 'TAC') : 'Offline';
        const badgeClass = isOnline ? 'active-app' : '';
        
        // Always show the lastSeen time you provided in Firebase
        const timeDisplay = user.lastSeen ? `Seen: ${user.lastSeen}` : 'Never';

        html += `
            <li class="member-item">
                <div class="member-header">
                    <span class="online-dot ${dotClass}"></span>
                    <span style="font-weight:600;">${name}</span>
                </div>
                <div class="member-details">
                    <span class="app-badge ${badgeClass}">${statusText}</span>
                    <span class="last-seen">${isOnline ? 'Active Now' : timeDisplay}</span>
                </div>
            </li>
        `;
    });

    html += '</ul></div>';

    if (matchCount === 0) {
        membersContainer.innerHTML = `<div class="no-results">No results for "${filter}"</div>`;
    } else {
        membersContainer.innerHTML = html;
    }
}

// Search input listener
searchInput.addEventListener('input', (e) => {
    db.ref('activeUsers').once('value', snap => {
        renderList(snap.val() || {}, e.target.value);
    });
});
