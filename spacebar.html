<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Ultimate Spacebar Clicker</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&display=swap');

    :root {
      --bg: #050508;
      --bg2: #0a0a10;
      --panel: #0d0d14;
      --panel-hover: #14141f;
      --accent: #22c55e;
      --accent-dim: rgba(34, 197, 94, 0.1);
      --accent-glow: rgba(34, 197, 94, 0.3);
      --muted: #4a4a5a;
      --border: rgba(255,255,255,0.04);
      --text: #e0e0e8;
      --text-dim: #8888a0;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: 'Rajdhani', sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      overflow-x: hidden;
    }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--accent-dim); border-radius: 3px; }

    #particles {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0; pointer-events: none;
    }

    .sidebar {
      position: fixed; left: 10px; top: 50%; transform: translateY(-50%);
      width: 70px; background: var(--panel); border: 1px solid var(--accent);
      border-radius: 16px; display: flex; flex-direction: column; align-items: center;
      padding: 12px 0; transition: all 0.3s ease; z-index: 1000;
      box-shadow: 0 0 30px var(--accent-glow), inset 0 0 30px rgba(0,0,0,0.5);
      backdrop-filter: blur(10px);
    }
    .sidebar.collapsed { width: 0; padding: 0; border: none; margin-left: -10px; overflow: hidden; }
    .logo-container { margin-bottom: 16px; padding: 4px; transition: opacity 0.3s; }
    .sidebar.collapsed .logo-container { opacity: 0; }
    .logo { width: 62px; height: 62px; border-radius: 8px; }
    .nav-items { display: flex; flex-direction: column; align-items: center; gap: 4px; width: 100%; padding: 0 8px; transition: opacity 0.3s; }
    .sidebar.collapsed .nav-items { opacity: 0; }
    .nav-item {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      width: 54px; height: 54px; border-radius: 10px; text-decoration: none;
      color: var(--accent); transition: all 0.2s ease; cursor: pointer;
    }
    .nav-item:hover { background: var(--accent-dim); }
    .nav-item.active { background: var(--accent-dim); border: 1px solid var(--accent); box-shadow: 0 0 10px var(--accent-dim); }
    .nav-item svg { width: 24px; height: 24px; margin-bottom: 2px; }
    .nav-item span { font-size: 9px; font-weight: 500; }

    .toggle-btn {
      position: fixed; left: 90px; top: 50%; transform: translateY(-50%);
      width: 20px; height: 36px; background: var(--panel); border: 1px solid var(--border);
      border-radius: 6px; display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: all 0.3s ease; z-index: 1001;
    }
    .toggle-btn:hover { background: var(--panel-hover); border-color: var(--accent); }
    .toggle-btn svg { width: 14px; height: 14px; color: #fff; transition: transform 0.3s ease; }
    .toggle-btn.collapsed { left: 10px; }
    .toggle-btn.collapsed svg { transform: rotate(180deg); }

    .main-content {
      position: relative; z-index: 1;
      margin-left: 100px; padding: 24px;
      transition: margin-left 0.3s ease; text-align: center;
    }
    .main-content.expanded { margin-left: 24px; }

    h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: 36px; font-weight: 900; margin: 20px 0 5px;
      background: linear-gradient(135deg, var(--accent), #fff, var(--accent));
      background-size: 200% 200%;
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      animation: shimmer 3s ease-in-out infinite;
      filter: drop-shadow(0 0 20px var(--accent-glow));
    }
    @keyframes shimmer {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    .subtitle { color: var(--text-dim); font-size: 13px; margin-bottom: 20px; letter-spacing: 3px; text-transform: uppercase; font-family: 'Orbitron', sans-serif; }

    .panel {
      background: linear-gradient(135deg, var(--panel), var(--bg2));
      border: 1px solid var(--border); border-radius: 16px; padding: 24px;
      margin: 20px auto; max-width: 1200px; backdrop-filter: blur(5px);
      position: relative; overflow: hidden;
    }
    .panel::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent); opacity: 0.5;
    }
    .panel h2 { font-family: 'Orbitron', sans-serif; color: var(--accent); font-size: 20px; margin-bottom: 16px; letter-spacing: 2px; }

    .stats-bar { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin: 16px auto; max-width: 1200px; }
    .stat-card {
      background: var(--panel); border: 1px solid var(--border); border-radius: 12px;
      padding: 12px 20px; min-width: 120px; transition: all 0.3s;
    }
    .stat-card:hover { border-color: var(--accent); box-shadow: 0 0 15px var(--accent-dim); transform: translateY(-2px); }
    .stat-card .stat-label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; font-family: 'Orbitron', sans-serif; }
    .stat-card .stat-value { font-size: 22px; font-weight: 700; color: var(--accent); font-family: 'Orbitron', sans-serif; }

    #clickBtn {
      font-family: 'Orbitron', sans-serif; font-size: 22px; padding: 28px 56px;
      border-radius: 16px; background: linear-gradient(135deg, var(--panel), var(--bg2));
      color: var(--accent); border: 2px solid var(--accent); cursor: pointer;
      transition: all 0.15s ease; font-weight: 700; letter-spacing: 3px; text-transform: uppercase;
      position: relative; overflow: hidden;
      box-shadow: 0 0 30px var(--accent-dim), inset 0 0 30px var(--accent-dim);
    }
    #clickBtn::before {
      content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
      background: radial-gradient(circle, var(--accent-glow), transparent 70%); opacity: 0; transition: opacity 0.3s;
    }
    #clickBtn:hover::before { opacity: 1; }
    #clickBtn:hover { transform: translateY(-3px) scale(1.02); box-shadow: 0 0 50px var(--accent-glow), inset 0 0 30px var(--accent-dim); }
    #clickBtn:active { transform: translateY(1px) scale(0.98); box-shadow: 0 0 20px var(--accent-dim); }

    .click-hint { color: var(--text-dim); font-size: 12px; margin-top: 8px; font-family: 'Orbitron', sans-serif; letter-spacing: 1px; }

    .float-number {
      position: fixed; pointer-events: none; font-family: 'Orbitron', sans-serif;
      font-weight: 900; color: var(--accent); text-shadow: 0 0 10px var(--accent-glow);
      animation: floatUp 1s ease-out forwards; z-index: 9999;
    }
    @keyframes floatUp {
      0% { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-80px) scale(1.5); }
    }

    .powerup-bar { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin: 12px auto; max-width: 800px; }
    .powerup-indicator {
      display: none; align-items: center; gap: 6px;
      background: var(--panel); border: 1px solid var(--accent); border-radius: 20px;
      padding: 6px 14px; font-size: 12px; font-family: 'Orbitron', sans-serif; color: var(--accent);
      animation: pulse 1s ease-in-out infinite; box-shadow: 0 0 15px var(--accent-dim);
    }
    .powerup-indicator.active { display: flex; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }

    .btn {
      font-family: 'Rajdhani', sans-serif; background: var(--panel); color: var(--accent);
      border: 1px solid var(--accent); padding: 8px 18px; margin: 5px; cursor: pointer;
      border-radius: 8px; font-size: 13px; font-weight: 600; transition: all 0.2s; letter-spacing: 0.5px;
    }
    .btn:hover { background: var(--accent); color: #000; box-shadow: 0 0 15px var(--accent-dim); }
    .btn:disabled, .btn.disabled { opacity: 0.3; cursor: not-allowed; }
    .btn:disabled:hover, .btn.disabled:hover { background: var(--panel); color: var(--accent); box-shadow: none; }
    .btn-save { background: var(--accent); color: #000; font-weight: 700; border: none; padding: 10px 24px; font-size: 14px; }
    .btn-save:hover { filter: brightness(1.2); box-shadow: 0 0 20px var(--accent-glow); }

    .shop-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; margin: 16px 0; }
    .shop-item {
      background: linear-gradient(135deg, rgba(255,255,255,0.02), rgba(255,255,255,0.005));
      border: 1px solid var(--border); border-radius: 12px; padding: 16px; transition: all 0.25s;
      position: relative; overflow: hidden;
    }
    .shop-item:hover { border-color: var(--accent); box-shadow: 0 0 20px var(--accent-dim); transform: translateY(-2px); }
    .shop-item.maxed { border-color: gold; box-shadow: 0 0 15px rgba(255,215,0,0.15); }
    .shop-item h4 { color: var(--accent); font-family: 'Orbitron', sans-serif; font-size: 13px; margin-bottom: 8px; letter-spacing: 0.5px; }
    .shop-item .item-emoji { font-size: 28px; margin-bottom: 6px; }
    .shop-item p { color: var(--text-dim); font-size: 12px; margin: 3px 0; }
    .shop-item .item-effect { color: var(--accent); font-size: 11px; font-weight: 600; margin-top: 6px; }
    .shop-item .level-bar { width: 100%; height: 3px; background: var(--border); border-radius: 2px; margin: 8px 0; overflow: hidden; }
    .shop-item .level-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.3s; box-shadow: 0 0 6px var(--accent-glow); }

    .shop-tabs { display: flex; gap: 6px; justify-content: center; margin-bottom: 16px; flex-wrap: wrap; }
    .shop-tab {
      font-family: 'Orbitron', sans-serif; font-size: 11px; padding: 6px 16px;
      background: var(--panel); border: 1px solid var(--border); color: var(--text-dim);
      border-radius: 20px; cursor: pointer; transition: all 0.2s;
    }
    .shop-tab:hover, .shop-tab.active { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }

    .leaderboard-controls { display: flex; gap: 8px; margin: 12px 0; justify-content: center; flex-wrap: wrap; }
    .leaderboard-list { text-align: left; max-height: 500px; overflow-y: auto; }
    .leaderboard-item {
      padding: 10px 14px; background: rgba(255,255,255,0.015); border: 1px solid var(--border);
      border-radius: 10px; margin: 6px 0; display: flex; justify-content: space-between;
      align-items: center; transition: all 0.2s; font-size: 13px;
    }
    .leaderboard-item:hover { border-color: var(--accent); background: var(--accent-dim); }
    .leaderboard-item .rank { font-family: 'Orbitron', sans-serif; font-weight: 700; color: var(--accent); min-width: 28px; }
    .leaderboard-item .rank.gold { color: #ffd700; }
    .leaderboard-item .rank.silver { color: #c0c0c0; }
    .leaderboard-item .rank.bronze { color: #cd7f32; }
    .leaderboard-item .player-name { font-weight: 600; flex: 1; margin-left: 10px; }
    .leaderboard-item .player-name.you { color: var(--accent); }
    .leaderboard-item .player-stats { color: var(--text-dim); font-size: 12px; }

    .achievements-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 10px; margin: 16px 0; }
    .achievement { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 14px; text-align: center; transition: all 0.3s; opacity: 0.4; }
    .achievement.unlocked { opacity: 1; border-color: var(--accent); box-shadow: 0 0 15px var(--accent-dim); }
    .achievement .ach-icon { font-size: 30px; margin-bottom: 6px; }
    .achievement .ach-name { font-family: 'Orbitron', sans-serif; font-size: 11px; color: var(--accent); margin-bottom: 4px; }
    .achievement .ach-desc { font-size: 11px; color: var(--text-dim); }

    .toast-container { position: fixed; top: 20px; right: 20px; z-index: 10000; display: flex; flex-direction: column; gap: 8px; }
    .toast {
      background: var(--panel); border: 1px solid var(--accent); border-radius: 10px;
      padding: 12px 20px; color: var(--accent); font-family: 'Orbitron', sans-serif; font-size: 12px;
      box-shadow: 0 0 20px var(--accent-glow); animation: toastIn 0.3s ease-out; max-width: 320px;
    }
    .toast.closing { animation: toastOut 0.3s ease-in forwards; }
    @keyframes toastIn { from { opacity: 0; transform: translateX(50px); } to { opacity: 1; transform: translateX(0); } }
    @keyframes toastOut { to { opacity: 0; transform: translateX(50px); } }

    #devMenu {
      position: fixed; top: 10px; right: 10px; background: var(--panel); border: 2px solid var(--accent);
      padding: 15px; display: none; z-index: 999; max-width: 300px; border-radius: 12px;
      box-shadow: 0 0 30px var(--accent-glow);
    }
    #devMenu h3 { color: var(--accent); margin-bottom: 10px; font-family: 'Orbitron', sans-serif; }

    .popup {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0);
      background: var(--panel); border: 2px solid var(--accent); border-radius: 16px; padding: 30px;
      z-index: 9999; box-shadow: 0 0 60px var(--accent-glow); animation: popupIn 0.3s forwards;
      min-width: 300px; text-align: center;
    }
    @keyframes popupIn { to { transform: translate(-50%, -50%) scale(1); } }
    .popup.closing { animation: popupOut 0.3s forwards; }
    @keyframes popupOut { to { transform: translate(-50%, -50%) scale(0); } }
    .popup h3 { color: var(--accent); margin-bottom: 15px; font-size: 22px; font-family: 'Orbitron', sans-serif; }

    .prestige-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 10001;
      display: flex; align-items: center; justify-content: center; animation: fadeIn 0.3s;
    }
    .prestige-overlay .prestige-box { text-align: center; animation: popupIn 0.5s ease-out; }
    .prestige-overlay h2 { font-family: 'Orbitron', sans-serif; font-size: 36px; color: var(--accent); margin-bottom: 10px; }
    .prestige-overlay p { color: var(--text-dim); font-size: 16px; margin-bottom: 20px; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    @media (max-width: 768px) {
      .main-content { margin-left: 24px; }
      .sidebar, .toggle-btn { display: none; }
      h1 { font-size: 24px; }
      .stat-card { min-width: 90px; padding: 8px 12px; }
      .stat-card .stat-value { font-size: 16px; }
      .shop-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
    }
  </style>
</head>
<body>

  <canvas id="particles"></canvas>
  <div class="toast-container" id="toastContainer"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
    import { getDatabase, ref, get, set, update, onValue } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBQslLAFRlIRJqsiJ2WWeTNslO067bzKYM",
      authDomain: "taclogin-ab38e.firebaseapp.com",
      databaseURL: "https://taclogin-ab38e-default-rtdb.firebaseio.com",
      projectId: "taclogin-ab38e",
      storageBucket: "taclogin-ab38e.firebasestorage.app",
      messagingSenderId: "937853298051",
      appId: "1:937853298051:web:119ccc7b5499514bd442b6"
    };

    const fbApp = initializeApp(firebaseConfig);
    const db = getDatabase(fbApp);

    // ========== PARTICLES ==========
    const canvas = document.getElementById('particles');
    const ctx = canvas.getContext('2d');
    let particles = [];
    function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);
    function createParticle() {
      return { x: Math.random()*canvas.width, y: Math.random()*canvas.height,
        size: Math.random()*2+0.5, speedX: (Math.random()-0.5)*0.3, speedY: (Math.random()-0.5)*0.3, opacity: Math.random()*0.5+0.1 };
    }
    for (let i=0;i<80;i++) particles.push(createParticle());
    function animateParticles() {
      ctx.clearRect(0,0,canvas.width,canvas.height);
      const accent = getComputedStyle(document.documentElement).getPropertyValue('--accent').trim();
      particles.forEach(p => {
        p.x+=p.speedX; p.y+=p.speedY;
        if(p.x<0||p.x>canvas.width) p.speedX*=-1;
        if(p.y<0||p.y>canvas.height) p.speedY*=-1;
        ctx.beginPath(); ctx.arc(p.x,p.y,p.size,0,Math.PI*2);

    // ========== FORMAT ==========
    function fmt(n) {
      n = Math.floor(n);
      if (n >= 1e15) return (n/1e15).toFixed(2)+'Q';
      if (n >= 1e12) return (n/1e12).toFixed(2)+'T';
      if (n >= 1e9)  return (n/1e9).toFixed(2)+'B';
      if (n >= 1e6)  return (n/1e6).toFixed(2)+'M';
      if (n >= 1e3)  return (n/1e3).toFixed(1)+'K';
      return n.toString();
    }

    // ========== CALCULATIONS ==========
    function getAutoCPS() {
      let cps = 0;
      cps += Math.floor(Math.pow(upgrades.autoClicker,2.15));
      cps += Math.floor(Math.pow(upgrades.megaClicker,3)*0.5);
      cps += Math.floor(Math.pow(upgrades.clickFarm,2.8)*2);
      cps += Math.floor(Math.pow(upgrades.nanoSwarm,3.2)*3);
      cps += Math.floor(Math.pow(upgrades.cosmicRay,3.5)*10);
      cps += Math.floor(Math.pow(upgrades.darkMatter,3.8)*5);
      cps += Math.floor(Math.pow(upgrades.antimatter,4)*20);
      cps += Math.floor(Math.pow(upgrades.singularity,5)*100);
      cps *= (1+upgrades.timeAccel*0.25);
      cps *= (1+upgrades.quantumBoost*2);
      cps *= Math.pow(2,upgrades.prestige);
      cps *= Math.pow(5,upgrades.hyperPrestige);
      if (frenzyActive) cps *= 10;
      if (timeWarpActive) cps *= 5;
      return Math.floor(cps);
    }

    function getClickValue() {
      let val = 1;
      val *= (1+upgrades.clickMultiplier*0.5);
      val += upgrades.goldenCursor*10;
      val *= (1+upgrades.clickStorm);
      val *= (1+upgrades.quantumBoost*2);
      val *= Math.pow(2,upgrades.prestige);
      val *= Math.pow(5,upgrades.hyperPrestige);
      if (doubleClicks) val *= 2;
      if (frenzyActive) val *= 10;
      if (critsActive) val *= 10;
      if (upgrades.critChance>0 && Math.random()*100<Math.min(upgrades.critChance*2,80)) val *= 10;
      return Math.floor(val);
    }

    // ========== SHOP ==========
    function renderShop() {
      const grid = document.getElementById('shopGrid');
      grid.innerHTML = '';
      shopItems.filter(item=>item.tab===currentTab).forEach(item=>{
        const level = upgrades[item.id]||0;
        const cost = item.getCost(level);
        const canBuy = clicks>=cost && level<item.maxLevel;
        const isMaxed = level>=item.maxLevel;
        const div = document.createElement('div');
        div.className = 'shop-item'+(isMaxed?' maxed':'');
        div.innerHTML = `
          <div class="item-emoji">${item.emoji}</div>
          <h4>${item.name}</h4>
          <p>${item.desc}</p>
          <div class="level-bar"><div class="level-fill" style="width:${(level/item.maxLevel)*100}%"></div></div>
          <p>Level: ${level} / ${item.maxLevel}</p>
          <p>Cost: ${isMaxed?'MAXED':fmt(cost)}</p>
          <div class="item-effect">${item.getEffect(level)}</div>
          <button class="btn" style="margin-top:8px;width:100%;" ${canBuy?'':'disabled'}>${isMaxed?'✅ MAXED':'BUY'}</button>
        `;
        if (canBuy) div.querySelector('button').onclick = ()=>buyItem(item);
        grid.appendChild(div);
      });
    }

    function buyItem(item) {
      const level = upgrades[item.id]||0;
      const cost = item.getCost(level);
      if (clicks<cost||level>=item.maxLevel) return;
      if (item.isPrestige) {
        if (!confirm(`⭐ PRESTIGE!\n\nResets clicks + upgrades. Gain permanent x${Math.pow(2,level+1)} mult.\n\nProceed?`)) return;
        doPrestige(); return;
      }
      if (item.isHyperPrestige) {
        if (!confirm(`🌟 HYPER PRESTIGE!\n\nResets EVERYTHING. Gain permanent x${Math.pow(5,level+1)} mult.\n\nProceed?`)) return;
        doHyperPrestige(); return;
      }
      clicks -= cost;
      upgrades[item.id] = level+1;
      showToast(`⬆️ ${item.name} → Lvl ${level+1}`);
      updateStats(); renderShop(); checkAchievements(); saveLocal();
    }

    function doPrestige() {
      const overlay = document.createElement('div');
      overlay.className = 'prestige-overlay';
      overlay.innerHTML = `<div class="prestige-box"><h2>⭐ PRESTIGE ${upgrades.prestige+1}</h2><p>Your power grows...</p></div>`;
      document.body.appendChild(overlay);
      clicks = 0;
      for (const key of Object.keys(upgrades)) {
        if (!['prestige','hyperPrestige','luckyDice','clickMagnet'].includes(key)) upgrades[key]=0;
      }
      upgrades.prestige++;
      setTimeout(()=>{ overlay.remove(); updateStats(); renderShop(); showToast(`⭐ Prestige ${upgrades.prestige}! x${Math.pow(2,upgrades.prestige)} mult!`); saveLocal(); }, 2000);
    }

    // ========== CLICKING ==========
    const clickBtn = document.getElementById('clickBtn');

      const add = getClickValue();
      clicks += add;
      totalClicksEver += add;
      clicksThisSecond += add;
      const rect = clickBtn.getBoundingClientRect();
      const x = (e&&e.clientX)?e.clientX:rect.left+rect.width/2;
      const y = (e&&e.clientY)?e.clientY:rect.top;
      spawnFloatNumber('+'+fmt(add), x-20+Math.random()*40, y-10);
      updateStats(); renderShop(); checkAchievements();
    }
    clickBtn.addEventListener('click', e=>handleClick(e));

    let powerupTimer;
    function schedulePowerup() {
      clearTimeout(powerupTimer);
      const base=120000, reduction=upgrades.luckyDice*0.1;

    // ========== SAVE / LOAD ==========
    function saveLocal() {
      localStorage.setItem('spacebar_save', JSON.stringify({
        clicks, bestCPS, totalClicksEver, upgrades:{...upgrades}, achievements:[...unlockedAchievements]
      }));
    }

    function loadLocal() {
      const raw = localStorage.getItem('spacebar_save');
      if (!raw) return;
      const data = JSON.parse(raw);
      clicks = data.clicks||0;
      bestCPS = data.bestCPS||0;
      totalClicksEver = data.totalClicksEver||data.clicks||0;
      if (data.upgrades) {
        for (const key of Object.keys(data.upgrades)) {
          if (key in upgrades) upgrades[key]=data.upgrades[key];
        }
      }
      // Migrate old flat format
      if (!data.upgrades) {
        if (data.autoClickerLevel)  upgrades.autoClicker   = data.autoClickerLevel;
        if (data.clickMultiplier>1) upgrades.clickMultiplier= Math.floor((data.clickMultiplier-1)/0.5);
        if (data.goldenClicks)      upgrades.goldenCursor   = data.goldenClicks;
        if (data.prestigeLevel)     upgrades.prestige       = data.prestigeLevel;
      }
      if (data.achievements) unlockedAchievements = new Set(data.achievements);
    }

    async function saveToFirebase() {
      if (!username) return;
      try {
        await update(ref(db, `clickerGame/players/${username}`), {
          name: username,
          totalClicks: clicks,
          totalClicksEver,
          bestCPS,
          autoClickerLevel: upgrades.autoClicker,
          prestigeLevel: upgrades.prestige,
          hyperPrestigeLevel: upgrades.hyperPrestige,
          upgrades: {...upgrades},
          achievements: [...unlockedAchievements],
          lastSaved: Date.now()
        });
      } catch(e) { console.warn('Firebase save failed:', e); }
    }

    async function saveGame() {
      saveLocal();
      await saveToFirebase();
    }

    document.getElementById('saveBtn').addEventListener('click', async ()=>{
      const btn = document.getElementById('saveBtn');
      btn.textContent='⏳ SAVING...'; btn.disabled=true;
      await saveGame();
      btn.textContent='✅ SAVED!';
      showToast('💾 Saved & submitted to leaderboard!');
      renderLeaderboard(cachedPlayers); // re-render with updated data
      setTimeout(()=>{ btn.textContent='💾 SAVE & SUBMIT TO LEADERBOARD'; btn.disabled=false; },2000);
    });

    setInterval(saveGame, 60000);
    document.addEventListener('visibilitychange', ()=>{ if(document.visibilityState==='hidden') saveGame(); });
    window.addEventListener('beforeunload', ()=>saveLocal());

    // ========== OFFLINE EARNINGS ==========
    function calculateOfflineEarnings() {
      const lastSave = localStorage.getItem('spacebar_lastTime');
      if (lastSave && upgrades.clickMagnet>0) {
        const elapsed = (Date.now()-parseInt(lastSave))/1000;
        if (elapsed>60) {
          const earned = Math.floor(getAutoCPS()*elapsed*(upgrades.clickMagnet*0.05));
          if (earned>0) { clicks+=earned; totalClicksEver+=earned; showToast(`💤 Welcome back! +${fmt(earned)} offline!`); }
        }
      }
      setInterval(()=>localStorage.setItem('spacebar_lastTime',Date.now().toString()),10000);
      localStorage.setItem('spacebar_lastTime',Date.now().toString());
    }

    // ========== LEADERBOARD — FIXED ==========
    let sortMode = 'clicks';
    let cachedPlayers = [];
    let lbUnsubscribe = null;

    // Normalize a player record so it works with both old & new save formats
    function normalizePlayer(p) {
      return {
        name:          p.name || 'Unknown',
        totalClicks:   p.totalClicks   || 0,
        totalClicksEver: p.totalClicksEver || p.totalClicks || 0,
        bestCPS:       p.bestCPS       || 0,
        prestigeLevel: p.prestigeLevel || (p.upgrades && p.upgrades.prestige) || 0,
        hyperPrestigeLevel: p.hyperPrestigeLevel || (p.upgrades && p.upgrades.hyperPrestige) || 0,
      };
    }

    function renderLeaderboard(players) {
      const list = document.getElementById('leaderboardList');
      const status = document.getElementById('lbStatus');

      if (!players || players.length === 0) {
        list.innerHTML = '<div style="text-align:center;color:var(--text-dim);padding:30px;font-family:\'Orbitron\',sans-serif;font-size:12px;">No players found. Click Save to join!</div>';
        return;
      }

      const sorted = [...players];
      if (sortMode==='clicks')   sorted.sort((a,b)=>b.totalClicks-a.totalClicks);
      if (sortMode==='cps')      sorted.sort((a,b)=>b.bestCPS-a.bestCPS);
      if (sortMode==='prestige') sorted.sort((a,b)=>(b.prestigeLevel+b.hyperPrestigeLevel*100)-(a.prestigeLevel+a.hyperPrestigeLevel*100));

      status.textContent = `${sorted.length} players · last updated ${new Date().toLocaleTimeString()}`;

      list.innerHTML = '';
      sorted.slice(0,50).forEach((p,i)=>{
        const div = document.createElement('div');
        div.className = 'leaderboard-item';
        const rankClass = i===0?'gold':i===1?'silver':i===2?'bronze':'';
        const medal = i===0?'👑':i===1?'🥈':i===2?'🥉':`${i+1}`;
        const isYou = p.name===username;
        const prestigeStr = p.hyperPrestigeLevel>0 ? `HP${p.hyperPrestigeLevel}·P${p.prestigeLevel}` : `P${p.prestigeLevel}`;
        div.innerHTML = `
          <span class="rank ${rankClass}">${medal}</span>
          <span class="player-name ${isYou?'you':''}">${p.name}${isYou?' (you)':''}</span>
          <span class="player-stats">${fmt(p.totalClicks)} clicks &nbsp;·&nbsp; ${fmt(p.bestCPS)} CPS &nbsp;·&nbsp; ${prestigeStr}</span>
        `;
        list.appendChild(div);
      });
    }

    function subscribeLeaderboard() {
      // Unsubscribe previous listener to avoid duplicates
      if (lbUnsubscribe) { lbUnsubscribe(); lbUnsubscribe=null; }

      const lbRef = ref(db, 'clickerGame/players');
      lbUnsubscribe = onValue(lbRef, (snap)=>{
        cachedPlayers = [];
        snap.forEach(child=>{
          const raw = child.val();
          if (raw && raw.name) cachedPlayers.push(normalizePlayer(raw));
        });
        renderLeaderboard(cachedPlayers);
      }, (err)=>{
        console.error('Leaderboard error:', err);
        document.getElementById('lbStatus').textContent = '⚠️ Could not load leaderboard.';
      });
    }

    // Sort buttons just re-sort cached data — no new Firebase calls
    document.getElementById('sortClicks').onclick   = ()=>{ sortMode='clicks';   renderLeaderboard(cachedPlayers); };
    document.getElementById('sortCPS').onclick      = ()=>{ sortMode='cps';      renderLeaderboard(cachedPlayers); };
    document.getElementById('sortPrestige').onclick = ()=>{ sortMode='prestige'; renderLeaderboard(cachedPlayers); };
    document.getElementById('refreshLB').onclick    = ()=>{ subscribeLeaderboard(); showToast('🔄 Leaderboard refreshed!'); };

    // ========== LOGIN ==========
    async function loginFlow() {
      const lastUser = localStorage.getItem('lastLoggedInUser');
      username = lastUser || prompt('Enter your name:') || 'Player';
      if (!lastUser) localStorage.setItem('lastLoggedInUser', username);

      // Load local first (instant)
      loadLocal();
      updateStats(); renderShop(); renderAchievements();

      // Then sync with Firebase
      try {
        const playerRef = ref(db, `clickerGame/players/${username}`);
        const snap = await get(playerRef);
        if (snap.exists()) {
          const fbData = snap.val();
          const fbClicks = fbData.totalClicks||0;
          if (fbClicks > clicks) {
            clicks = fbClicks;
            totalClicksEver = Math.max(totalClicksEver, fbData.totalClicksEver||fbClicks);
            bestCPS = Math.max(bestCPS, fbData.bestCPS||0);
            if (fbData.upgrades) {
              for (const key of Object.keys(fbData.upgrades)) {
                if (key in upgrades) upgrades[key]=Math.max(upgrades[key]||0, fbData.upgrades[key]);
              }
            } else {
              // Migrate old flat format from Firebase
              upgrades.autoClicker   = Math.max(upgrades.autoClicker, fbData.autoClickerLevel||0);
              upgrades.prestige      = Math.max(upgrades.prestige, fbData.prestigeLevel||0);
              upgrades.hyperPrestige = Math.max(upgrades.hyperPrestige, fbData.hyperPrestigeLevel||0);
              if (fbData.goldenClicks) upgrades.goldenCursor = Math.max(upgrades.goldenCursor, fbData.goldenClicks);
              if (fbData.clickMultiplier>1) upgrades.clickMultiplier = Math.max(upgrades.clickMultiplier, Math.floor((fbData.clickMultiplier-1)/0.5));
            }
            if (fbData.achievements) fbData.achievements.forEach(a=>unlockedAchievements.add(a));
          }
        } else {
          await saveToFirebase();
        }
      } catch(e) { console.warn('Firebase load failed, using local save:', e); }

      if (username==='Logan') document.getElementById('devMenu').style.display='block';

      calculateOfflineEarnings();
      updateStats(); renderShop(); renderAchievements(); checkAchievements(); saveLocal();

      // Subscribe leaderboard AFTER login so username is set for highlighting
      subscribeLeaderboard();
    }

    // ========== DEV MENU ==========
    document.getElementById('spawnAll').onclick    = ()=>powerups.forEach(p=>p.effect());
    document.getElementById('forceFrenzy').onclick = ()=>{ frenzyActive=true; showToast('🔥 Dev Frenzy!'); setTimeout(()=>{frenzyActive=false;updateStats();},10000); };
    document.getElementById('forceDouble').onclick = ()=>{ doubleClicks=true; showToast('✨ Dev Double!'); setTimeout(()=>{doubleClicks=false;updateStats();},20000); };
    document.getElementById('addClicks').onclick   = ()=>{ clicks+=1000000; totalClicksEver+=1000000; updateStats(); renderShop(); showToast('+1M clicks!'); };
    document.getElementById('resetGame').onclick   = ()=>{
      if (!confirm('Reset everything?')) return;
      clicks=0; bestCPS=0; totalClicksEver=0;
      for (const key of Object.keys(upgrades)) upgrades[key]=0;
      unlockedAchievements.clear();
      updateStats(); renderShop(); renderAchievements(); saveGame(); showToast('🗑️ Reset!');
    };
    document.getElementById('devSave').onclick = ()=>{ saveGame(); showToast('Dev saved!'); };

    // ========== START ==========
    loginFlow();
  </script>

  <script src="idle-dvd.js"></script>
  <script src="timeTracker.js"></script>
