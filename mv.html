<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Movies — Proxy Wall</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600&family=JetBrains+Mono:wght@400;700&display=swap');

  *{margin:0;padding:0;box-sizing:border-box;}
  :root{
    --bg:#070b10;--bg2:#0d1117;--bg3:#111820;
    --primary:#00ffaa;--accent:#9b59ff;--yellow:#f1c232;--red:#ff4455;--blue:#4ea8ff;
    --text:#c9d1e0;--text-dim:#6b7a90;--border:#1e2a38;
  }
  body{
    font-family:'Inter',sans-serif;
    background:var(--bg);
    color:var(--text);
    min-height:100vh;
    padding: 32px 36px;
  }
  a{color:var(--primary);text-decoration:none;}
  a:hover{text-decoration:underline;opacity:.85;}

  /* SECTION */
  .section-title{font-family:'Orbitron',sans-serif;font-size:20px;font-weight:700;color:#fff;margin-bottom:6px;display:flex;align-items:center;gap:10px;}
  .section-title .icon{font-size:22px;}
  .section-subtitle{color:var(--text-dim);font-size:13px;margin-bottom:24px;margin-left:32px;}
  
  /* INFO BOX */
  .info-box{border-radius:10px;padding:18px 22px;margin-bottom:20px;border-left:4px solid;}
  .info-box.blue{background:rgba(78,168,255,.05);border-color:var(--blue);}
  .info-box-title{font-weight:700;font-size:13px;margin-bottom:8px;color:#fff;}
  .info-box p{font-size:13px;color:var(--text-dim);line-height:1.7;}

  /* MOVIES */
  .movies-doc-frame{
    width:100%;
    min-height:80vh;
    border:1px solid var(--border);
    border-radius:10px;
    background:var(--bg3);
  }
</style>
</head>
<body>

  <div style="max-width:960px; margin:0 auto;">
    <div class="section-title"><span class="icon">🎬</span> Movies &amp; Shows</div>
    <div class="section-subtitle">Stream movies and TV shows for free</div>

    <div class="info-box blue">
      <div class="info-box-title">🎬 Movie Document</div>
      <p>Scroll down inside the box below to browse and click on links to watch movies!</p>
    </div>

    <iframe class="movies-doc-frame" src="https://docs.google.com/document/d/e/2PACX-1vTCuDrWdvwZvhSakvy0crMEP9hLb2ncjj0rNGMN8nXVjuG9KGjCOsR2nqNTiLuimmSiXLRviuaXrk-O/pub?embedded=true"></iframe>
  </div>

</body>
</html>
