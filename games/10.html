<!DOCTYPE html>
<html lang="en">
 <head>
    <link rel="stylesheet" href="rightclick.css">
    <link rel="stylesheet" href="custom-cursor.css">
  <link href="rightclick.css" rel="stylesheet"/>
  <link href="custom-cursor.css" rel="stylesheet"/>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>
   Bloons Tower Defense 5
  </title>
  <script src="https://unpkg.com/@ruffle-rs/ruffle@latest/ruffle.js">
  </script>
  <style>
   html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: black; /* optional */
    }
    #flash-container {
      width: 100%;
      height: 100%;
    }
    ruffle-player {
      width: 100%;
      height: 100%;
      display: block;
    }
  </style>
  <script src="app-presence.js">
  </script>
 </head>
 <body>
  <script>
   window.RufflePlayer = window.RufflePlayer || {};
    window.addEventListener("load", function () {
      const ruffle = window.RufflePlayer.newest();
      const player = ruffle.createPlayer();
      const container = document.getElementById("flash-container");
      container.appendChild(player);
      player.load("https://noahsamazingtutoringhelp.github.io/glowing-chainsaw/badpiggies.swf");
    });
  </script>
  <div id="flash-container">
  </div>
  <script src="custom-cursor.js">
  </script>
  <script src="rightclick.js">
  </script>
  <script src="panic-key.js">
  </script>
  <script src="idle-dvd.js">
  </script>
  
 
<script type="module" src="online.js"></script>
    <script src="custom-cursor.js"></script>
    <script src="rightclick.js"></script>
    <script src="panic-key.js"></script>
    <script src="idle-dvd.js"></script>
</body>
</html>
