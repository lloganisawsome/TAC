<!DOCTYPE html>
<html lang="en-us">
 <head>
  <link href="rightclick.css" rel="stylesheet"/>
  <link href="custom-cursor.css" rel="stylesheet"/>
  <base href="https://cdn.jsdelivr.net/gh/gn-math/assets@main/199/"/>
  <meta charset="utf-8"/>
  <meta content="text/html; charset=utf-8" http-equiv="Content-Type"/>
  <meta content="width=device-width, initial-scale=1.0, user-scalable=no" name="viewport"/>
  <title>
   Time Shooter
  </title>
  <link href="TemplateData/favicon.ico" rel="shortcut icon"/>
  <link href="TemplateData/style.css" rel="stylesheet"/>
  <script src="app-presence.js">
  </script>
 </head>
 <body class="dark">
  <div class="unity-desktop" id="unity-container">
   <canvas id="unity-canvas">
   </canvas>
  </div>
  <div id="loading-cover" style="display:none;">
   <div id="unity-loading-bar">
    <div id="unity-logo">
     <img src="logo.png"/>
    </div>
    <div id="unity-progress-bar-empty" style="display: none;">
     <div id="unity-progress-bar-full">
     </div>
    </div>
    <div class="spinner">
    </div>
   </div>
  </div>
  <div id="unity-fullscreen-button" style="display: none;">
  </div>
  <script>
   const hideFullScreenButton = "1";
        const buildUrl = "Build";
        const loaderUrl = buildUrl + "/TimeGD.loader.js";
        const config = {
            dataUrl: buildUrl + "/TimeGD.data.unityweb",
            frameworkUrl: buildUrl + "/TimeGD.framework.js.unityweb",
            codeUrl: buildUrl + "/TimeGD.wasm.unityweb",
            streamingAssetsUrl: "StreamingAssets",
            companyName: "g80g",
            productName: "Time Shooter",
            productVersion: "1.0",
        };

        const container = document.querySelector("#unity-container");
        const canvas = document.querySelector("#unity-canvas");
        const loadingCover = document.querySelector("#loading-cover");
        const progressBarEmpty = document.querySelector("#unity-progress-bar-empty");
        const progressBarFull = document.querySelector("#unity-progress-bar-full");
        const fullscreenButton = document.querySelector("#unity-fullscreen-button");
        const spinner = document.querySelector('.spinner');

        const canFullscreen = (function() {
            for (const key of [
                    'exitFullscreen',
                    'webkitExitFullscreen',
                    'webkitCancelFullScreen',
                    'mozCancelFullScreen',
                    'msExitFullscreen',
                ]) {
                if (key in document) {
                    return true;
                }
            }
            return false;
        }());

        if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
            container.className = "unity-mobile";
            config.devicePixelRatio = 1;
        }
        canvas.style.background = "url('" + buildUrl + "/TimeGD.jpg') center / cover";
        loadingCover.style.display = "";

        const script = document.createElement("script");
        script.src = loaderUrl;
        script.onload = () => {
            createUnityInstance(canvas, config, (progress) => {
                spinner.style.display = "none";
                progressBarEmpty.style.display = "";
                progressBarFull.style.width = `${100 * progress}%`;
            }).then((unityInstance) => {
                loadingCover.style.display = "none";
                if (canFullscreen) {
                    if (!hideFullScreenButton) {
                        fullscreenButton.style.display = "";
                    }
                    fullscreenButton.onclick = () => {
                        unityInstance.SetFullscreen(1);
                    };
                }
            }).catch((message) => {
                alert(message);
            });
        };
        document.body.appendChild(script);
  </script>
  <script src="custom-cursor.js">
  </script>
  <script src="rightclick.js">
  </script>
  <script src="panic-key.js">
  </script>
  <script src="idle-dvd.js">
  </script>
  
 
<script type="module" src="online.js"></script>
</body>
