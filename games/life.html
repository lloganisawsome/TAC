<!DOCTYPE html>
<html lang="en">
 <head>
  <link href="rightclick.css" rel="stylesheet"/>
  <link href="custom-cursor.css" rel="stylesheet"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <script src="https://unpkg.com/@ruffle-rs/ruffle">
  </script>
  <style>
   html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: black;
        }
        #flash-container {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        ruffle-player {
            width: 100vw !important;
            height: 100vh !important;
        }
  </style>
  <script src="app-presence.js">
  </script>
 </head>
 <body>
  <div id="flash-container">
  </div>
  <script>
   const swfUrl = "/extra/GachaLifePC.swf";
const container = document.getElementById("flash-container");
const ruffle = window.RufflePlayer?.newest() || window.RufflePlayer;
const player = ruffle.createPlayer();
container.appendChild(player);
player.load(swfUrl);
  </script>
  <script src="custom-cursor.js">
  </script>
  <script src="rightclick.js">
  </script>
  <script src="panic-key.js">
  </script>
  <script src="idle-dvd.js">
  </script>
  <script src="online.js" type="module">
  </script>
 </body>
</html>
