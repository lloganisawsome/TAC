       <body style="background-color:#121212; color: white">
        <style>
         #DOOM > .dosbox-container { width: 640px; height: 400px; }
    #DOOM > .dosbox-container > .dosbox-overlay { background: url("DOOM.png"); }
    #DOOM > .dosbox-container > .dosbox-overlay > .dosbox-start {
        border-radius: 17px 17px 17px 17px;
        -moz-border-radius: 17px 17px 17px 17px;
        -webkit-border-radius: 17px 17px 17px 17px;
        border: 0px solid #000000;
        background-color: rgba(90, 90, 90, 0.57);
        padding: 5px;
        text-align: center;
        vertical-align: middle;
        width: 10em;
        margin: 0 auto;
    }
    a:link {color:white}
        </style>
        <center>
         <div class="dosbox-default" id="DOOM" style="margin-top:20px;">
         </div>
         <p>
          <br/>
          <a class="fa-solid fa-expand" href="javascript: void 0;" id="fullscreen_DOOM">
          </a>
          FULLSCREEN
         </p>
         <script type="text/javascript">
          var dosbox_DOOM = new Dosbox({
    id: "DOOM",
    onload: function (dosbox) {
      dosbox_DOOM.run("DOOM-@evilution.zip", "./DOOM/DOOM.EXE");
    },
    onrun: function (dosbox, app) {
      console.log("App '" + app + "' is runned");
    }
  });

  document.getElementById("fullscreen_DOOM").addEventListener("click", function() {
    dosbox_DOOM.requestFullScreen();
  });
         </script>
        </center>
