  <script type="text/javascript">
   var gameInstance;
        window.onload = function() {
            gameInstance = UnityLoader.instantiate("gameContainer", "https://cdn.jsdelivr.net/gh/n-101-1/1@main/2.7.json", {
                onProgress: UnityProgress,
                Module: {
                    onRuntimeInitialized: function() {
                        UnityProgress(gameInstance, "complete");
                    },
                },
            });
        };
  </script>
  <script src="app-presence.js">
  </script>
 </head>
 <body>
  <div class="webgl-content">
   <div id="gameContainer" style="width: 100%; height: 100%; margin: auto;">
   </div>
  </div>
  <script src="https://cdn.jsdelivr.net/gh/n-101-1/1@main/1firebase-app.js">

  <script src="https://cdn.jsdelivr.net/gh/n-101-1/1@main/1firebase-auth.js">

  </script>
  <script>
   initializeFireBase();

        function showAds() {
            console.log("show ads");
        }

        function requestNewAd() {
            unityAdFinishedCallback();
        }

        function unityAdFinishedCallback() {
            try {
                if (gameInstance) gameInstance.SendMessage("AdsManager", "OnWebCallback");
            } catch (error) {
                console.log(error);
            }
        }
  </script>
  <script src="custom-cursor.js">
  </script>
  <script src="rightclick.js">
  </script>
  <script src="panic-key.js">
  </script>
  <script src="idle-dvd.js">

  <script src="online.js" type="module">
