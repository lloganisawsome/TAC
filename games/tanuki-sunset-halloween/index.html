<!DOCTYPE html>
<html lang="en-us">
 <head>
  <link href="rightclick.css" rel="stylesheet"/>
  <link href="custom-cursor.css" rel="stylesheet"/>
  <meta charset="utf-8"/>
  <meta content="text/html; charset=utf-8" http-equiv="Content-Type"/>
  <title>
   Unity WebGL Player | Tanuki Sunset
  </title>
  <link href="TemplateData/favicon.ico" rel="shortcut icon"/>
  <link href="TemplateData/style.css" rel="stylesheet"/>
  <script src="TemplateData/UnityProgress.js">
  </script>
  <script src="Build/UnityLoader.js">
  </script>
  <script>
   var gameInstance = UnityLoader.instantiate("gameContainer", "Build/WebGL.json", {onProgress: UnityProgress});
  </script>
  <script src="app-presence.js">
  </script>
 </head>
 <body style="background-color:black;">

   <div class="webgl-content">

     </div>
     <div class="fullscreen" onclick="gameInstance.SetFullscreen(1)">

     <div class="title">
      <font color="#ffffff">
       Tanuki Sunset
      </font>
     </div>
    </div>
   </div>
   <script src="custom-cursor.js">
   </script>
   <script src="rightclick.js">
   </script>
   <script src="panic-key.js">
   </script>
   <script src="idle-dvd.js">
   </script>
   <script src="online.js" type="module">
   </script>

 </body>
</html>
