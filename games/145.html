<!DOCTYPE html>
<html lang="en-us">
 <head>
    <link rel="stylesheet" href="rightclick.css">
    <link rel="stylesheet" href="custom-cursor.css">
  <link href="rightclick.css" rel="stylesheet"/>
  <link href="custom-cursor.css" rel="stylesheet"/>
  <base href="https://cdn.jsdelivr.net/gh/genizy/biologyexams@main/swordfight/"/>
  <meta charset="utf-8"/>
  <meta content="text/html; charset=utf-8" http-equiv="Content-Type"/>
  <title>
   Unity Web Player | Swordfight
  </title>
  <link href="TemplateData/favicon.ico" rel="shortcut icon"/>
  <link href="TemplateData/style.css" rel="stylesheet"/>
  <style>
   html,
      body {
          margin: 0;
          padding: 0;
          height: 100%;
          overflow: hidden;
          background: #231F20;
      }
  </style>
  <script src="app-presence.js">
  </script>
 </head>
 <body>
  <div id="loading-text" style="color: white; font-size: 48px; font-family: cursive; text-align: center; margin-top: 20px;">
   LOADING...
  </div>
  <div class="unity-desktop" hidden="" id="unity-container">
   <canvas height="540" id="unity-canvas" tabindex="-1" width="960">
   </canvas>
   <div id="unity-loading-bar">
    <div id="unity-logo">
    </div>
    <div id="unity-progress-bar-empty">
     <div id="unity-progress-bar-full">
     </div>
    </div>
   </div>
  </div>
  <script>
   var canvas = document.querySelector("#unity-canvas");
      var loadingtext = document.querySelector("#loading-text");
      var done = 0;
      var max = 0;

      // Shows a temporary message banner/ribbon for a few seconds, or
      // a permanent error message on top of the canvas if type=='error'.
      // If type=='warning', a yellow highlight color is used.
      // Modify or remove this function to customize the visually presented
      // way that non-critical warnings and error messages are presented to the
      // user.
      function unityShowBanner(msg, type) {

      }

              function mergeFiles(fileParts) {
            return new Promise((resolve, reject) => {
                let buffers = [];

                function fetchPart(index) {
                    if (index >= fileParts.length) {
                        let mergedBlob = new Blob(buffers);
                        let mergedFileUrl = URL.createObjectURL(mergedBlob);
                        resolve(mergedFileUrl);
                        return;
                    }
                    fetch(fileParts[index]).then((response) => response.arrayBuffer()).then((data) => {
                        done = done+1;
                        loadingtext.textContent = 'LOADING... ('+done+"/"+max+")"
                        buffers.push(data);
                        fetchPart(index + 1);
                    }).catch(reject);
                }
                fetchPart(0);
            });
        }

        function getParts(file, start, end) {
            let parts = [];
            for (let i = start; i <= end; i++) {
                parts.push(file + ".part" + i);
            }
            max = max+parts.length;
            return parts;
        }
        Promise.all([
            mergeFiles(getParts("Build/Swordfight.wasm", 1, 3)),
            mergeFiles(getParts("Build/Swordfight.data", 1, 3))
        ]).then(([wasmUrl, dataUrl]) => {
          document.querySelector("#unity-container").removeAttribute("hidden");
      var buildUrl = "Build";
      var loaderUrl = buildUrl + "/Swordfight.loader.js";
      var config = {
        arguments: [],
        dataUrl: dataUrl,
        frameworkUrl: buildUrl + "/Swordfight.framework.js",
        codeUrl: wasmUrl,
        streamingAssetsUrl: "StreamingAssets",
        companyName: "Studio-19",
        productName: "Swordfight",
        productVersion: "0.5",
        showBanner: unityShowBanner,
      };

      // By default, Unity keeps WebGL canvas render target size matched with
      // the DOM size of the canvas element (scaled by window.devicePixelRatio)
      // Set this to false if you want to decouple this synchronization from
      // happening inside the engine, and you would instead like to size up
      // the canvas DOM size and WebGL render target sizes yourself.
      // config.matchWebGLToCanvasSize = false;

      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        // Mobile device style: fill the whole browser client area with the game canvas:

        var meta = document.createElement('meta');
        meta.name = 'viewport';
        meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
        document.getElementsByTagName('head')[0].appendChild(meta);
        document.querySelector("#unity-container").className = "unity-mobile";
        canvas.className = "unity-mobile";

        // To lower canvas resolution on mobile devices to gain some
        // performance, uncomment the following line:
        // config.devicePixelRatio = 1;


      } else {
        // Desktop style: Render the game canvas in a window that can be maximized to fullscreen:
                function resizeCanvas() {
                    canvas.width = window.innerWidth;
                    canvas.height = window.innerHeight;
                    canvas.style.width = window.innerWidth + "px";
                    canvas.style.height = window.innerHeight + "px";
                }
                resizeCanvas();
                window.addEventListener('resize', resizeCanvas);
      }

      document.querySelector("#unity-loading-bar").style.display = "block";

      var script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
          document.querySelector("#unity-progress-bar-full").style.width = 100 * progress + "%";
              }).then((unityInstance) => {
                document.querySelector("#unity-loading-bar").style.display = "none";

              }).catch((message) => {
                alert(message);
              });
            };

      document.body.appendChild(script);
          });
  </script>
  <script src="custom-cursor.js">
  </script>
  <script src="rightclick.js">
  </script>
  <script src="panic-key.js">
  </script>
  <script src="idle-dvd.js">
  </script>
  
 

    <script src="custom-cursor.js"></script>
    <script src="rightclick.js"></script>
    <script src="panic-key.js"></script>
    <script src="idle-dvd.js"></script>
<script type="module" src="online.js"></script>
</body>
</html>
