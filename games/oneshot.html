  <title>
   Oneshot Legacy
  </title>

  <style>
   :root {
      --color-gray: hsl(0, 0%, 55%);
      --controls-size: 10vh;
    }
    @media (orientation: landscape) {
      :root {
        --controls-size: 20vh;
      }
    }
    html {
      touch-action: none;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif, "Apple Color Emoji", "Segoe UI Emoji";
      margin: 0;
      color: white;
      background: black;
    }
    .unselectable {
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }
    #status {
      font-size: 1.5rem;
      color: var(--color-gray);
      text-align: center;
    }
    #controls {
      position: relative;
      text-align: right;
      z-index: 10;
    }
    #controls button {
      -webkit-appearance: button;
      display: inline-flex;
      background: transparent;
      border: 0;
      color: white;
      font-family: inherit;
      font-size: 1em;
      line-height: inherit;
      cursor: pointer;
      padding: 0.5rem;
    }
    #controls svg {
      pointer-events: none;
    }
    #canvas {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 100%;
      height: 100%;
      border: 0;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      transform: translate(-50%, -50%);
    }
    img#canvas {
      object-fit: contain;
    }
    #dpad,
    #apad {
      position: fixed;
      bottom: 1rem;
    }
    #dpad {
      left: 1rem;
    }
    #apad {
      right: 1rem;
    }
    #dpad svg {
      width: calc(2 * var(--controls-size));
      height: calc(2 * var(--controls-size));
      fill: var(--color-gray);
    }
    #dpad svg rect {
      opacity: 0.4;
    }
    #apad > * {
      width: var(--controls-size);
      height: var(--controls-size);
      background-color: var(--color-gray);
      border-radius: 50%;
    }
    #apad > :last-child {
      position: relative;
      right: var(--controls-size);
    }
    #dpad path:not(.active),
    #apad > *:not(.active) {
      opacity: 0.4;
    }
  </style>
  <script src="app-presence.js">
  </script>
 </head>
 <body>
  <div id="controls">
   <button class="unselectable" id="controls-fullscreen">
    <svg fill="none" height="25" viewbox="0 0 15 15" width="25" xmlns="https://static.wikia.nocookie.net/oneshot/images/1/1f/Niko_WME.jpg/revision/latest?cb=20220925190751">
     <path d="M13.5 13.5H10m3.5 0V10m0 3.5l-4-4m.5-8h3.5m0 0V5m0-3.5l-4 4M5 1.5H1.5m0 0V5m0-3.5l4 4m-4 4.5v3.5m0 0H5m-3.5 0l4-4" stroke="currentColor">
     </path>
    </svg>
   </button>
  </div>
  <div id="status">
  </div>
  <div id="viewport">
   <canvas class="unselectable" id="canvas" tabindex="-1">
   </canvas>
   <div class="unselectable" id="dpad">
    <svg viewbox="0 0 72 72" xmlns="https://static.wikia.nocookie.net/oneshot/images/1/1f/Niko_WME.jpg/revision/latest?cb=20220925190751">
     <path d="M48,5.8C48,2.5,45.4,0,42,0H29.9C26.6,0,24,2.4,24,5.8V24h24V5.8z" data-key="ArrowUp" id="dpad-up">
     </path>
     <path d="M66.2,24H48v24h18.2c3.3,0,5.8-2.7,5.8-6V29.9C72,26.5,69.5,24,66.2,24z" data-key="ArrowRight" id="dpad-right">
     </path>
     <path d="M24,66.3c0,3.3,2.6,5.7,5.9,5.7H42c3.3,0,6-2.4,6-5.7V48H24V66.3z" data-key="ArrowDown" id="dpad-down">
     </path>
     <path d="M5.7,24C2.4,24,0,26.5,0,29.9V42c0,3.3,2.3,6,5.7,6H24V24H5.7z" data-key="ArrowLeft" id="dpad-left">
     </path>
     <rect height="24" id="dpad-center" width="24" x="24" y="24">
     </rect>
    </svg>
   </div>
   <div class="unselectable" id="apad">
    <div data-key="Escape" id="apad-escape">
    </div>
    <div data-key="Enter" id="apad-enter">
    </div>
   </div>
  </div>

  <script async="" src="https://cdn.jsdelivr.net/gh/67-Factory/oneshotthing@main/index.js" type="text/javascript">
  </script>
  <script>
   const hasTouchscreen = window.matchMedia('(hover: none), (pointer: coarse)').matches;
const preventNativeKeys = ['ArrowUp', 'ArrowDown', 'ArrowRight', 'ArrowLeft', ' ', 'F12'];
const keys = new Map();
const keysDown = new Map();
const canvas = document.getElementById('canvas');
let easyrpgPlayer;
let lastTouchedId;
window.addEventListener('load', (event) => {
    createEasyRpgPlayer({
      game: undefined,
      saveFs: undefined
    }).then(function(Module) {
      easyrpgPlayer = Module;
      easyrpgPlayer.initApi();
      canvas.focus();
    });
});
canvas.addEventListener('mouseenter', () => canvas.focus());
canvas.addEventListener('click', () => canvas.focus());
document.querySelector('#controls-fullscreen').addEventListener('click', () => {
  const viewport = document.getElementById('viewport');
  if (viewport.requestFullscreen) {
    viewport.requestFullscreen();
  }
});
function simulateKeyboardEvent(eventType, key) {
  const event = new Event(eventType, { bubbles: true });
  event.code = key;
  canvas.dispatchEvent(event);
}
function simulateKeyboardInput(key) {
  simulateKeyboardEvent('keydown', key);
  window.setTimeout(() => {
    simulateKeyboardEvent('keyup', key);
  }, 100);
}
function bindKey(node, key) {
  keys.set(node.id, key);
  node.addEventListener('touchstart', event => {
    event.preventDefault();
    simulateKeyboardEvent('keydown', key);
    keysDown.set(event.target.id, node.id);
    node.classList.add('active');
  });
  node.addEventListener('touchend', event => {
    event.preventDefault();
    const pressedKey = keysDown.get(event.target.id);
    if (pressedKey && keys.has(pressedKey)) {
      const key = keys.get(pressedKey);
      simulateKeyboardEvent('keyup', key);
    }
    keysDown.delete(event.target.id);
    node.classList.remove('active');
    if (lastTouchedId) {
      document.getElementById(lastTouchedId).classList.remove('active');
    }
  });
  node.addEventListener('touchmove', event => {
    const { target, clientX, clientY } = event.changedTouches[0];
    const origTargetId = keysDown.get(target.id);
    const nextTargetId = document.elementFromPoint(clientX, clientY).id;
    if (origTargetId === nextTargetId) return;
    if (origTargetId) {
      const key = keys.get(origTargetId);
      simulateKeyboardEvent('keyup', key);
      keysDown.delete(target.id);
      document.getElementById(origTargetId).classList.remove('active');
    }
    if (keys.has(nextTargetId)) {
      const key = keys.get(nextTargetId);
      simulateKeyboardEvent('keydown', key);
      keysDown.set(target.id, nextTargetId);
      lastTouchedId = nextTargetId;
      document.getElementById(nextTargetId).classList.add('active');
    }
  })
}
let gamepads = {};
const haveEvents = 'ongamepadconnected' in window;
function addGamepad(gamepad) {
  if (gamepad == undefined) return;
  gamepads[gamepad.index] = gamepad;
  updateTouchControlsVisibility();
}
function removeGamepad(gamepad) {
  if (gamepad == undefined) return;
  delete gamepads[gamepad.index];
  updateTouchControlsVisibility();
}
function getGamepads() {
  var pads = navigator.getGamepads ? navigator.getGamepads() : (navigator.webkitGetGamepads ? navigator.webkitGetGamepads() : []);
  return pads;
}
function scanGamePads() {
  var pads = getGamepads();
  for (var i = 0; i < pads.length; i++) {
    if (pads[i]) {
      if (pads[i].index in gamepads) {
        gamepads[pads[i].index] = pads[i];
      } else {
        addGamepad(pads[i]);
      }
    }
  }
}
if (!haveEvents) {
  setInterval(scanGamePads, 500);
}
window.addEventListener('gamepadconnected', function(e) {
  addGamepad(e.gamepad);
});
window.addEventListener('gamepaddisconnected', function(e) {
  removeGamepad(e.gamepad);
})
function updateTouchControlsVisibility() {
  if (hasTouchscreen && Object.keys(gamepads).length === 0) {
    for (const elem of document.querySelectorAll('#dpad, #apad')) {
      elem.style.display = '';
    }
  } else {
    for (const elem of document.querySelectorAll('#dpad, #apad')) {
      elem.style.display = 'none';
    }
  }
}
if (hasTouchscreen) {
  for (const button of document.querySelectorAll('[data-key]')) {
    bindKey(button, button.dataset.key);
  }
} else {
  window.addEventListener('keydown', event => {
    if (preventNativeKeys.includes(event.key)) {
      event.preventDefault();
    }
  });
  canvas.addEventListener('contextmenu', event => {
    event.preventDefault();
  });
}
updateTouchControlsVisibility();
  </script>
