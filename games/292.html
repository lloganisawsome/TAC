<!DOCTYPE html>
<html lang="en-us">
 <head>
  <link href="rightclick.css" rel="stylesheet"/>
  <link href="custom-cursor.css" rel="stylesheet"/>
  <base href="https://cdn.jsdelivr.net/gh/web-ports/soft-and-wet@main/"/>
  <meta charset="utf-8"/>
  <meta content="text/html; charset=utf-8" http-equiv="Content-Type"/>
  <meta content="viewport-fit=cover, width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0" name="viewport"/>
  <title>
   GXC Game
  </title>
  <link href="style.css" rel="stylesheet"/>
  <script src="app-presence.js">
  </script>
 </head>
 <body>
  <div id="loading-text" style="color: white; font-size: 48px; font-family: cursive; text-align: center; margin-top: 20px;">
   LOADING...
  </div>
  <canvas class="emscripten" id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1">
  </canvas>
  <div hidden="" id="pauseMenuContainer">
   <div id="pauseMenuBorder">
    <div id="pauseMenu">
     <button id="resumeButton" onclick="resume()">
      Resume
     </button>
     <button id="quitButton" onclick="quitIfSupported()">
      Quit
     </button>
    </div>
   </div>
  </div>
  <div class="loading">
   <div class="spinner" id="spinner">
   </div>
   <div class="emscripten" id="status">
    Downloading...
   </div>
   <progress hidden="1" id="progress" max="100" value="0">
   </progress>
   <img alt="URL QR Code" class="qrCode" hidden="1" id="QRCode" src="runner.svg"/>
   <img alt="URL QR2 Code" class="qrCode" hidden="1" id="QR2Code" src="runnerLocal.svg"/>
  </div>
  <div class="wallpaper-container" id="wallpaper-container" style="display: none">
   <button class="output-button" onclick="toggleElement('wallpaper-config-iframe')">
    Toggle configurator
   </button>
  </div>
  <!-- The wallpaper config is displayed in an iframe to make it possible to use keyboard for entering values (it's consumed by
        the runner in the original document). -->
  <iframe class="floating-control" id="wallpaper-config-iframe" src="about:blank">
  </iframe>
  <div id="message-container">
   <div id="messages">
   </div>
  </div>
  <script>
   let loadingtext = document.getElementById("loading-text");
      let doneparts = 0;
      function mergeFiles(fileParts) {
      return new Promise((resolve, reject) => {
          let buffers = [];

          function fetchPart(index) {
              if (index >= fileParts.length) {
                  let mergedBlob = new Blob(buffers);
                  let mergedFileUrl = URL.createObjectURL(mergedBlob);
                  resolve(mergedFileUrl);
                  return;
              }
              fetch(fileParts[index]).then((response) => response.arrayBuffer()).then((data) => {
                  buffers.push(data);
                  doneparts = doneparts+1;
                  loadingtext.textContent = "LOADING... ("+doneparts+"/"+maxparts+")";
                  fetchPart(index + 1);
              }).catch(reject);
          }
          fetchPart(0);
      });
  }
// sixty seven
  let maxparts = 0;
  function getParts(file, start, end) {
      let parts = [];
      for (let i = start; i <= end; i++) {
          parts.push(file + ".part" + i);
      }
      maxparts = parts.length+maxparts;
      loadingtext.textContent = "LOADING... ("+doneparts+"/"+maxparts+")";
      return parts;
  }
          Promise.all([
            mergeFiles(getParts("game.unx", 1, 8)),
        ]).then(([gameunx]) => {
      window.gameUnxUrl = gameunx;

      const originalFetch = window.fetch;
      window.fetch = async function (input, init) {
        let urlString;

        if (input instanceof Request) {
          urlString = input.url;
        } else {
          urlString = String(input);
        }

        if (urlString.includes("game.unx")) {
          if (input instanceof Request) {
              input = new Request(window.gameUnxUrl, input);
          } else {
              input = window.gameUnxUrl;
          }
        }

        return originalFetch(input, init);
      };

      const originalOpen = XMLHttpRequest.prototype.open;
      XMLHttpRequest.prototype.open = function (method, url, ...rest) {
          if (url.includes("game.unx")) {
              url = window.gameUnxUrl;
          }
          return originalOpen.call(this, method, url, ...rest);
      };

      let tickworkerreal = document.createElement("script");
      let index = document.createElement("script");
      index.src = "index.js";
      document.body.appendChild(index);

      let runner = document.createElement("script");
      runner.src = "runner.js";
      document.body.appendChild(runner);
      loadingtext.remove();
        });
  </script>
  <script src="custom-cursor.js">
  </script>
  <script src="rightclick.js">
  </script>
  <script src="panic-key.js">
  </script>
  <script src="idle-dvd.js">
  </script>
  
 
<script type="module" src="online.js"></script>
</body>
</html>
