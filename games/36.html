<!DOCTYPE html>
<html lang="en-us">
 <head>
    <link rel="stylesheet" href="rightclick.css">
    <link rel="stylesheet" href="custom-cursor.css">
  <link href="rightclick.css" rel="stylesheet"/>
  <link href="custom-cursor.css" rel="stylesheet"/>
  <base href="https://cdn.jsdelivr.net/gh/gn-math/assets@main/318/"/>
  <meta charset="utf-8"/>
  <meta content="text/html; charset=utf-8" http-equiv="Content-Type"/>
  <title>
   Unity Web Player | Roulette
  </title>
  <link href="TemplateData/favicon.ico" rel="shortcut icon"/>
  <link href="TemplateData/style.css" rel="stylesheet"/>
  <link href="manifest.webmanifest" rel="manifest"/>
  <script src="https://cdn.jsdelivr.net/gh/gn-math/assets@main/merge.js">
  </script>
  <script src="app-presence.js">
  </script>
 </head>
 <body>
  <div id="loading-text" style="color: black; font-family: cursive; font-size: 48px; text-align: center; margin-top: 20px;">
   LOADING...
  </div>
  <div hidden="" id="unity-container">
   <canvas height="600" id="unity-canvas" tabindex="-1" width="960">
   </canvas>
   <div id="unity-loading-bar">
    <div id="unity-logo">
    </div>
    <div id="unity-progress-bar-empty">
     <div id="unity-progress-bar-full">
     </div>
    </div>
   </div>
  </div>
  <script>
   Promise.all([
            window.mergeFiles(window.getParts("Build/SideEffectsWebBuild_V0.1.wasm.br", 1, 3)),
            window.mergeFiles(window.getParts("Build/SideEffectsWebBuild_V0.1.data.br", 1, 12)),
        ]).then(([wasmUrl, dataUrl]) => {
            document.getElementById('loading-text').remove();
            window.addEventListener("load", function () {
                if ("serviceWorker" in navigator) {
                    navigator.serviceWorker.register("ServiceWorker.js");
                }
            });
            var container = document.querySelector("#unity-container");
            var canvas = document.querySelector("#unity-canvas");
            var loadingBar = document.querySelector("#unity-loading-bar");
            var progressBarFull = document.querySelector("#unity-progress-bar-full");
            var warningBanner = document.querySelector("#unity-warning");
            container.removeAttribute("hidden");

            function unityShowBanner(msg, type) {
                
            }
            var buildUrl = "Build";
            var loaderUrl = buildUrl + "/SideEffectsWebBuild_V0.1.loader.js";
            var config = {
                arguments: [],
                dataUrl: dataUrl,
                frameworkUrl: buildUrl + "/SideEffectsWebBuild_V0.1.framework.js",
                codeUrl: wasmUrl,
                streamingAssetsUrl: "StreamingAssets",
                companyName: "DefaultCompany",
                productName: "Roulette",
                productVersion: "0.1.0",
                showBanner: unityShowBanner,
            };
            // By default Unity keeps WebGL canvas render target size matched with
            // the DOM size of the canvas element (scaled by window.devicePixelRatio)
            // Set this to false if you want to decouple this synchronization from
            // happening inside the engine, and you would instead like to size up
            // the canvas DOM size and WebGL render target sizes yourself.
            // config.matchWebGLToCanvasSize = false;
            if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
                // Mobile device style: fill the whole browser client area with the game canvas:
                var meta = document.createElement('meta');
                meta.name = 'viewport';
                meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
                document.getElementsByTagName('head')[0].appendChild(meta);
            }
            loadingBar.style.display = "block";
            var script = document.createElement("script");
            script.src = loaderUrl;
            script.onload = () => {
                createUnityInstance(canvas, config, (progress) => {
                    progressBarFull.style.width = 100 * progress + "%";
                }).then((unityInstance) => {
                    loadingBar.style.display = "none";
                }).catch((message) => {
                    alert(message);
                });
            };
            document.body.appendChild(script);
        });
  </script>
  <script src="custom-cursor.js">
  </script>
  <script src="rightclick.js">
  </script>
  <script src="panic-key.js">
  </script>
  <script src="idle-dvd.js">
  </script>
  
 

    <script src="custom-cursor.js"></script>
    <script src="rightclick.js"></script>
    <script src="panic-key.js"></script>
    <script src="idle-dvd.js"></script>
<script type="module" src="online.js"></script>
</body>
</html>
