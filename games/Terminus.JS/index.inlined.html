html {
    font-size: 3vh;
    scroll-behavior: unset;
    --terminal-font: 350 0.5rem "Monocraft";
}
body {
    scroll-behavior: unset;
    display: flex;
    flex-direction: row;
    justify-content: flex-start;
    align-items: flex-start;
    margin: 0;
    height: 100vh;
}

#terminal {
    display: flex;
    flex-direction: column-reverse;
    flex-basis: content;
    flex-shrink: 0;
    
    height: 100vh;
    min-width: 100vw;
    max-width: 100vw;
    
    background-color: #222222;
    color: white;
    
    font: var(--terminal-font);
}
#terminal #log {
    margin: 0.3rem;
    margin-bottom: 0.1rem;
    flex-grow: 1;
    overflow-y: auto;
    scroll-behavior: smooth;
    display: flex;
    flex-direction: column-reverse;
    /* font-size: 1rem; */
}
#terminal #log > p {
    padding: 0.2em;
    color: white;
    margin-top: 0.1em;
    margin-bottom: 0.1em;
    background-color: #3338;
    line-height: 1em;
    line-break: auto;
}
#terminal #log > p:nth-child(even) {
    background-color: #4448;
}
#terminal #log > p.error {
    background-color: #a338;
}
#terminal #log > p.error:nth-child(even) {
    background-color: #e338;
}
#terminal #log > p.warn {
    background-color: rgba(170, 118, 51, 0.533);
}
#terminal #log > p.warn:nth-child(even) {
    background-color: rgba(238, 151, 51, 0.533);
}
#terminal #log > p.mus {
    background-color: lightblue;
    color: black;
}
#terminal #log > p.mus:nth-child(even) {
    background-color: lightskyblue;
    color: black;
}
#terminal #log > p.debug {
    background-color: green;
    color: black;
}
#terminal #log > p.debug:nth-child(even) {
    background-color: lime;
    color: black;
}
#terminal #break > p.break {
    background-color: #222;
}
#terminal #log:before {
    content: "";
    display: block;
    background-image: repeating-linear-gradient(
        25deg,
        transparent,
        transparent 1rem,
        #555 1rem,
        #555 2rem
    );
}
#terminal #log:after {
    content: "";
    display: block;
    background-image: repeating-linear-gradient(
        25deg,
        transparent,
        transparent 1rem,
        #555 1rem,
        #555 2rem
    );
}
#terminal #input {
    margin: 0.3rem;
    padding: 0.2em;
    margin-top: 0.1rem;
    height: 1em;
    flex-grow: 0;
    background-color: #6668;
    border: none;
    outline: none;
    caret-color: white;
    color: white;
    font: var(--terminal-font);
}

@media (max-aspect-ratio: 1/1) {
    html {
        font-size: 4vw;
    }
    body {
        flex-direction: column;
    }
    #terminal {
        width: 100vw;
        min-height: 100vh;
        max-height: 100vh;
        max-width: 100vw;
    }
    #terminal #input {
        height: 1.5em;
        font-size: 3em;
        padding: 0em;
        margin: 0.3rem;
    }
    #terminal #log {
        height: 1.5em;
        font-size: 3em;
        
    }
    #terminal #mus {
        height: 1.5em;
        font-size: 3em;
    }
    #terminal #break {
        height: 1.5em;
        font-size: 3em;
    }
}

function greetMessage() {
    let date = new Date();
    if (randomnumbah(0, 10000) == 1) {
        return "Unwelcome to AntiTerminus.";
    } else if (date.getMonth() == 0 && getDate() == 1) {
        return "Happy New Year! Welcome to Terminus.";
    } else if (date.getMonth() == 8 && date.getDate() == 15) {
        return `It's Terminus.JS anniversary! Welcome!`;
    }
    return "Welcome to Terminus.JS";
}

    await sleep(1000);
    terminal.log(greetMessage());
    await sleep(1500);
    terminal.log("You can type 'help' to see available commands");
    await sleep(1500);
});

    basegain: 1,
    upgradebonus: 1,
    upgpriceboost: 0,
    upgstage: 0,
    updateloop: 1,

    pointcalc: () => {
        game.pointcalcstatus = false;
        game.points += (game.basegain +
            game.steponeadd * game.steptwomult *
                game.stepthreemult +
            game.stepfouradd * game.powerpoints)
             ;
        if (game.itemduration > 0) {
            game.itemduration -= 1;
            game.points *= game.itemmult;
        }
    },
    totalmus: 1,
});

game.points$onChange((points) => {
    terminal.log(`You have ${points.toFixed(2)} points.`);
    if (!game.indebted && points < 0) {
        game.indebted = true;
    } else if (game.indebted && points > 0) {
        game.indebted = false;
    }
});

});

});

game.power$onChange(async (power) => {
    if (game.power == game.maxbattery) {
        return terminal.log("Full charge.");
    }
    await sleep(1000);
    terminal.log("Current battery: " + game.power);
});

terminal.addCommand(function charge() {
    if (!game.chargeCooldown) {
        if (game.power < game.maxbattery) {
            game.power = game.power + game.rechargerate;
            game.chargeCooldown = true;
            setTimeout(() => {
                game.chargeCooldown = false;
            }, 3000); // 5 seconds cooldown
        }
    } else {
        terminal.log("Charge command is on cooldown. Please wait a few seconds.");
    }
});

const exptolevel = 100;

terminal.addCommand(function update() {
    if (game.power <= 0) {
        game.xp = game.xp + 10;
        terminal.log("Gained 10 exp.");
        if (game.xp == exptolevel) {
            game.skillpoints = game.skillpoints + 1;
            terminal.log("Leveled up!");
        }
        return;
    }

    game.powerpoints = game.power / game.antipower;
    game.power -= 1;

    game.pointcalc();
});

            terminal.mus(`${playedsong}.wav`);

    });
});
