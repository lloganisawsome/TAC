<!DOCTYPE html>
<html lang="en-us">
 <head>
  <link href="rightclick.css" rel="stylesheet"/>
  <link href="custom-cursor.css" rel="stylesheet"/>
  <meta charset="utf-8"/>
  <base href="https://cdn.jsdelivr.net/gh/bubbls/ports@main/midnight-shift/"/>
  <meta content="text/html; charset=utf-8" http-equiv="Content-Type"/>
  <title>
   Unity WebGL Player | Midnight Shift 1.2
  </title>
  <link href="TemplateData/favicon.ico" rel="shortcut icon"/>
  <link href="TemplateData/style.css" rel="stylesheet"/>
  <script>
   window.fileMergerConfig = {
      files: [
        { name: 'cool.data.unityweb', parts: 2 },
        { name: 'cool.asm.code.unityweb', parts: 2 }, 
      ],
      basePath: 'Build/',
      debug: true
    };
  </script>
  <script src="merge.js">
  </script>
  <script src="TemplateData/UnityProgress.js">
  </script>
  <script src="Build/UnityLoader.js">
  </script>
  <script>
   var gameInstance = UnityLoader.instantiate("gameContainer", "Build/cool.json", {onProgress: UnityProgress});
  </script>
  <script src="app-presence.js">
  </script>
 </head>
 <body>
  <div class="webgl-content">
   <style>
    body {
          margin: 0;
          overflow: hidden;
        }
   </style>
   <div id="gameContainer" style="width: 100vw; height: 100vh;">
   </div>
   <div id="gameContainer" style="width: 896px; height: 504px">
   </div>
   <div class="footer">
    <div class="webgl-logo">
    </div>
    <div class="fullscreen" onclick="gameInstance.SetFullscreen(1)">
    </div>
    <div class="title">
     Midnight Shift 1.2
    </div>
   </div>
  </div>
  <script src="custom-cursor.js">
  </script>
  <script src="rightclick.js">
  </script>
  <script src="panic-key.js">
