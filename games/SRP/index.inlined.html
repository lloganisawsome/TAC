<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Stickman Ragdoll Playground</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <style>
body { padding: 0; margin: 0 }
#unity-container { position: absolute }
#unity-container.unity-desktop { left: 50%; top: 50%; transform: translate(-50%, -50%) }
#unity-container.unity-mobile { position: fixed; width: 100%; height: 100% }
#unity-canvas { background: #1F1F1F }
.unity-mobile #unity-canvas { width: 100%; height: 100% }
#unity-loading-bar { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); display: none }
#unity-progress-bar-empty { width: 141px; height: 18px; margin-top: 10px; margin-left: 6.5px; background: url("data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAI0AAAASAQAAAABOFWCeAAAAAnRSTlMAAHaTzTgAAAAZSURBVHgBY/iPDn5gEzrAgAYkRqgQceEFAAzIU22a66fQAAAAAElFTkSuQmCC") no-repeat center }
#unity-progress-bar-full { width: 0%; height: 18px; margin-top: 10px; background: url("data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAI0AAAASAQAAAABOFWCeAAAAEUlEQVR4AWP4jw5+UCw0KgQAUYhCTnW3FD4AAAAASUVORK5CYII=") no-repeat center }
#unity-footer { position: relative }
.unity-mobile #unity-footer { display: none }

</style>
  </head>
  <body>
    <div id="unity-container" style="position: absolute; width: 100%; height: 100%; left: 0%; top: 0%;">
      <canvas id="unity-canvas" style="position: absolute; width: 100%; height: 100%;"></canvas>
      <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>     
    </div>
    <script>

      var container = document.querySelector("#unity-container");
      var canvas = document.querySelector("#unity-canvas");
      var loadingBar = document.querySelector("#unity-loading-bar");
      var progressBarFull = document.querySelector("#unity-progress-bar-full");   


      function unityShowBanner(msg, type) {
       
      }

      var buildUrl = "Build";
      var loaderUrl = buildUrl + "/RagdollPlaygroundGameDistribution.loader.js";
      var config = {
        dataUrl: buildUrl + "/f15deef7bb9de527487dbfee3bedcf5a.data.unityweb",
        frameworkUrl: buildUrl + "/5c24f3bce494248b42cd74be39c5108e.js.unityweb",
        codeUrl: buildUrl + "/799b2a1b9e0c042a4de680d9c0c38f3c.wasm.unityweb",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "Stock Develop",
        productName: "Stickman Ragdoll Playground 2D",
        productVersion: "1.0.0",
        showBanner: unityShowBanner,
      };

     
      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {

        var meta = document.createElement('meta');
        meta.name = 'viewport';
        meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
        document.getElementsByTagName('head')[0].appendChild(meta);
        container.className = "unity-mobile";
        canvas.className = "unity-mobile";

     

      } else {

        canvas.style.width = "100%";
        canvas.style.height = "100%";
      }

      loadingBar.style.display = "block";

      var script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
          progressBarFull.style.width = 100 * progress + "%";
              }).then((unityInstance) => {
                loadingBar.style.display = "none";
                
              }).catch((message) => {
                alert(message);
              });
            };

      document.body.appendChild(script);

    </script>
  </body>
</html>
